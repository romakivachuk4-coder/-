<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trust Wallet Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --btn-bg: #1e1e1e;
            --accent: #38f37b; /* Тот самый зеленый */
            --muted: #8e8e8e;
            --red: #ff4a4a;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { background: var(--bg); color: #fff; overflow-x: hidden; }

        /* HEADER */
        .header { 
            display: flex; align-items: center; padding: 12px 16px; gap: 12px; 
            position: sticky; top: 0; background: var(--bg); z-index: 100;
        }
        
        .sett-icon { position: relative; font-size: 26px; cursor: pointer; }
        .sett-dot { 
            position: absolute; top: 0; right: 0; width: 9px; height: 9px; 
            background: var(--red); border-radius: 50%; border: 2px solid var(--bg);
        }

        .search-bar { 
            flex: 1; background: var(--surface); border-radius: 12px; 
            display: flex; align-items: center; padding: 8px 12px; gap: 8px; 
        }
        .search-bar input { 
            background: transparent; border: none; color: #fff; width: 100%; 
            outline: none; font-size: 16px; 
        }

        /* WALLET SECTION */
        .wallet { text-align: center; padding: 25px 0 20px; }
        
        .wallet-name { 
            display: inline-flex; align-items: center; gap: 5px;
            background: var(--surface); padding: 6px 14px; border-radius: 20px;
            font-size: 14px; font-weight: 600; margin-bottom: 20px; cursor: pointer;
        }
        .wallet-name .dot-indicator { 
            width: 8px; height: 8px; background: var(--red); border-radius: 50%;
        }

        .main-amount { font-size: 58px; font-weight: 700; letter-spacing: -1px; }
        .sub-amount { font-size: 16px; font-weight: 500; margin-top: 5px; }
        .neg { color: var(--red); }

        /* ACTION BUTTONS */
        .actions { display: flex; justify-content: center; gap: 20px; margin: 20px 0 30px; }
        .act-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .act-btn { 
            width: 65px; height: 65px; border-radius: 22px; 
            background: var(--btn-bg); display: flex; align-items: center; 
            justify-content: center; font-size: 28px; transition: 0.2s;
        }
        .act-btn.green { background: var(--accent); color: #000; }
        .act-item span { font-size: 13px; font-weight: 500; }
        .act-item:active .act-btn { transform: scale(0.95); }

        /* TABS */
        .tabs { display: flex; align-items: center; border-bottom: 1px solid #1a1a1a; padding: 0 16px; margin-bottom: 15px; }
        .tab { padding: 12px 0; font-weight: 700; font-size: 15px; color: var(--muted); margin-right: 20px; cursor: pointer; }
        .tab.active { color: #fff; border-bottom: 2px solid var(--accent); }
        .tab-icons { margin-left: auto; display: flex; gap: 15px; color: var(--muted); font-size: 20px; }

        /* LIST */
        .coin { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; }
        .coin-info { display: flex; align-items: center; gap: 12px; }
        .coin-img { width: 40px; height: 40px; border-radius: 50%; }
        .coin-name { font-weight: 700; font-size: 16px; }
        .coin-cap { font-size: 13px; color: var(--muted); }
        .coin-price-block { text-align: right; }
        .c-price { font-weight: 600; font-size: 16px; }
        .c-change { font-size: 13px; font-weight: 500; }

        /* BOTTOM NAVIGATION - ТОЧНО КАК НА СКРИНЕ */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; height: 85px; 
            background: #0d0d0d; border-top: 1px solid #1a1a1a;
            display: flex; align-items: center; justify-content: space-around; 
            padding-bottom: 15px; z-index: 1000;
        }
        .nav-link { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--muted); text-decoration: none; font-size: 10px; cursor: pointer; }
        .nav-link.active { color: var(--accent); }
        .nav-link i { font-size: 24px; }
        
        .trade-btn { 
            width: 55px; height: 55px; background: var(--accent); 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; margin-top: -45px; 
            border: 5px solid var(--bg); color: #000; font-size: 24px;
        }

        /* MODAL */
        #modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
            display: none; align-items: center; justify-content: center; z-index: 2000; 
        }
        .m-content { background: var(--surface); padding: 25px; border-radius: 24px; width: 80%; text-align: center; }
        .m-content input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 12px; margin: 15px 0; font-size: 20px; text-align: center; }
        .m-content button { background: var(--accent); border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        .up { color: var(--accent); }
        .down { color: var(--red); }
    </style>
</head>
<body>

<div class="app" id="appContent">
    <header class="header">
        <div class="sett-icon"><i class='bx bx-cog'></i><div class="sett-dot"></div></div>
        <div class="search-bar"><i class='bx bx-search'></i><input type="text" placeholder="Поиск"></div>
        <i class='bx bx-scan' style="font-size: 24px;"></i>
    </header>

    <div class="wallet">
        <div class="wallet-name" onclick="showModal()">
            Основной кошелек <i class='bx bx-chevron-right'></i>
        </div>
        <div class="main-amount" id="balance">0,00 $</div>
        <div class="sub-amount neg" id="sub-balance">0,00 $ (0.00%)</div>
    </div>

    <div class="actions">
        <div class="act-item"><div class="act-btn"><i class='bx bx-up-arrow-alt' style="transform: rotate(45deg);"></i></div><span>Отпр...</span></div>
        <div class="act-item"><div class="act-btn"><i class='bx bx-down-arrow-alt'></i></div><span>Полу...</span></div>
        <div class="act-item"><div class="act-btn"><i class='bx bx-refresh'></i></div><span>Обмен</span></div>
        <div class="act-item"><div class="act-btn green"><i class='bx bx-plus'></i></div><span>Поку...</span></div>
    </div>

    <div class="tabs">
        <div class="tab">Криптовалюта</div>
        <div class="tab active">Избранное</div>
        <div class="tab">NFT</div>
        <div class="tab-icons">
            <i class='bx bx-history'></i>
            <i class='bx bx-slider-alt'></i>
        </div>
    </div>

    <div id="coin-list">
        </div>
</div>

<nav class="nav-bar">
    <div class="nav-link active"><i class='bx bxs-home-alt-2'></i><span>Главная</span></div>
    <div class="nav-link"><i class='bx bx-trending-up'></i><span>Популярные</span></div>
    <div class="nav-link"><div class="trade-btn"><i class='bx bx-transfer'></i></div><span style="margin-top: 5px;">Торговать</span></div>
    <div class="nav-link"><i class='bx bx-gift'></i><span>Награды</span></div>
    <div class="nav-link" onclick="showModal()"><i class='bx bx-compass'></i><span>Подробнее</span></a>
</nav>

<div id="modal" onclick="hideModal()">
    <div class="m-content" onclick="event.stopPropagation()">
        <h3>Баланс USDT</h3>
        <input type="number" id="inputBal" placeholder="Напр. 1999.96">
        <button onclick="saveBal()">Подтвердить</button>
    </div>
</div>

<script>
    let userBal = localStorage.getItem('wallet_bal') || 0;

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }

    function saveBal() {
        const val = document.getElementById('inputBal').value;
        if(val !== "") {
            userBal = val;
            localStorage.setItem('wallet_bal', val);
            // Анимация обновления
            document.getElementById('appContent').style.opacity = '0.5';
            setTimeout(() => {
                updateUI();
                document.getElementById('appContent').style.opacity = '1';
                hideModal();
            }, 300);
        }
    }

    async function updateUI() {
        const fmt = new Intl.NumberFormat('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=tether,bitcoin,ethereum,solana,binancecoin&vs_currencies=usd&include_24hr_change=true');
            const data = await res.json();
            
            // Расчет главного баланса
            const total = userBal * data.tether.usd;
            document.getElementById('balance').innerText = fmt.format(total) + " $";
            
            // Отрисовка списка
            const coins = [
                {id:'solana', s:'SOL', img:'https://assets.coingecko.com/coins/images/4128/small/solana.png'},
                {id:'ethereum', s:'ETH', img:'https://assets.coingecko.com/coins/images/279/small/ethereum.png'},
                {id:'bitcoin', s:'BTC', img:'https://assets.coingecko.com/coins/images/1/small/bitcoin.png'},
                {id:'binancecoin', s:'BNB', img:'https://assets.coingecko.com/coins/images/825/small/bnb-icon2_2x.png'}
            ];

            let html = '';
            coins.forEach(c => {
                const info = data[c.id];
                const up = info.usd_24h_change >= 0;
                html += `
                <div class="coin">
                    <div class="coin-info">
                        <img src="${c.img}" class="coin-img">
                        <div>
                            <div class="coin-name">${c.s}</div>
                            <div class="coin-cap">4.34 $B</div>
                        </div>
                    </div>
                    <div class="coin-price-block">
                        <div class="c-price">${fmt.format(info.usd)} $</div>
                        <div class="c-change ${up?'up':'down'}">${up?'+':''}${info.usd_24h_change.toFixed(2)}%</div>
                    </div>
                </div>`;
            });
            document.getElementById('coin-list').innerHTML = html;
        } catch(e) { console.log(e) }
    }

    updateUI();
</script>
</body>
</html>
