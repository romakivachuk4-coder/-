<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trust Wallet UI Clone</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0d0d0d;
            --surface: #1a1a1a;
            --accent: #38f37b;
            --text-main: #ffffff;
            --text-muted: #8e8e8e;
            --red: #ff4d4d;
            --green: #38f37b;
            --dot: #ff4d4d;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex; justify-content: center;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            padding-bottom: 140px;
            position: relative;
        }

        /* --- HEADER --- */
        .header {
            display: flex; align-items: center; padding: 12px 16px; gap: 12px;
            position: sticky; top: 0; background: var(--bg-color); z-index: 10;
        }

        .status-dot {
            position: absolute; top: -1px; right: -1px;
            width: 9px; height: 9px; background: var(--dot);
            border-radius: 50%; border: 2px solid var(--bg-color);
        }

        .search-box {
            flex-grow: 1; background: var(--surface); border-radius: 12px;
            display: flex; align-items: center; padding: 10px 14px; gap: 8px;
        }

        .search-box input {
            background: transparent; border: none; color: #fff;
            width: 100%; outline: none; font-size: 16px;
        }

        /* --- WALLET CARD --- */
        .wallet-card { text-align: center; padding: 20px 0; }

        .wallet-selector-container {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; margin-bottom: 25px;
        }

        .wallet-pill {
            background: var(--surface); padding: 6px 14px; border-radius: 20px;
            font-size: 14px; font-weight: 600; display: flex; align-items: center;
            gap: 4px; cursor: pointer; position: relative;
        }

        .copy-icon { color: var(--text-muted); font-size: 22px; }

        .main-balance { font-size: 52px; font-weight: 700; margin-bottom: 2px; }
        .sub-balance { font-size: 16px; font-weight: 500; }

        /* --- ACTIONS --- */
        .actions-row { display: flex; justify-content: center; gap: 18px; padding: 10px 0 30px; }
        .action-btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }

        .btn-circle {
            width: 62px; height: 62px; border-radius: 18px;
            background: var(--surface); display: flex; align-items: center;
            justify-content: center; font-size: 26px;
        }

        .btn-circle.green { background: #81f7a6; color: #000; }
        .btn-label { font-size: 13px; font-weight: 500; }

        /* --- TABS --- */
        .tabs-header {
            display: flex; align-items: center; padding: 0 16px;
            border-bottom: 1px solid #222; margin-bottom: 15px;
        }

        .tab { padding: 14px 10px; color: var(--text-muted); font-weight: 700; font-size: 16px; }
        .tab.active { color: #fff; position: relative; }
        .tab.active::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0;
            height: 3px; background: var(--accent); border-radius: 2px;
        }

        .tab-tools { margin-left: auto; display: flex; gap: 15px; color: var(--text-muted); font-size: 20px; }

        /* --- COIN LIST --- */
        .coin-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; transition: 0.2s;
        }

        .coin-row:active { background: #1a1a1a; }

        .coin-left { display: flex; align-items: center; gap: 12px; }
        .coin-img { width: 42px; height: 42px; border-radius: 50%; }

        .coin-name-wrap { display: flex; flex-direction: column; }
        .coin-symbol { font-weight: 700; font-size: 17px; }
        .coin-mcap { font-size: 13px; color: var(--text-muted); }

        .coin-right { text-align: right; }
        .coin-price { font-weight: 600; font-size: 17px; display: block; }
        .coin-pct { font-size: 13px; font-weight: 500; }

        .view-tokens {
            display: block; text-align: center; color: var(--accent);
            padding: 25px; font-weight: 600; text-decoration: none; font-size: 15px;
        }

        .earn-section {
            padding: 10px 16px; font-size: 19px; font-weight: 700;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* --- FOOTER NAV --- */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 94%; max-width: 420px; background: #151515; border-radius: 40px;
            height: 78px; display: flex; justify-content: space-around; align-items: center;
            border: 1px solid #252525; z-index: 1000;
        }

        .nav-link {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-muted); text-decoration: none; gap: 4px; flex: 1;
        }

        .nav-link.active { color: var(--accent); }
        .nav-link i { font-size: 24px; }
        .nav-link span { font-size: 10px; font-weight: 500; }

        .trade-center {
            width: 54px; height: 54px; background: var(--accent);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; color: #000; font-size: 26px;
            margin-top: -35px; border: 4px solid var(--bg-color);
        }

        /* --- MODAL --- */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; display: none;
            justify-content: center; align-items: center; backdrop-filter: blur(8px);
        }

        .modal-body {
            background: #1c1c1e; padding: 30px; border-radius: 28px;
            width: 85%; max-width: 340px; text-align: center;
        }

        .modal-body input {
            width: 100%; background: #000; border: 1px solid #333;
            color: #fff; padding: 15px; border-radius: 14px;
            margin: 20px 0; font-size: 28px; text-align: center; outline: none;
        }

        .modal-body button {
            background: var(--accent); border: none; width: 100%;
            padding: 16px; border-radius: 14px; font-weight: 700; font-size: 16px;
        }

        .up { color: var(--green) !important; }
        .down { color: var(--red) !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <div style="position: relative;">
                <i class='bx bx-cog' style="font-size: 26px;"></i>
                <div class="status-dot"></div>
            </div>
            <div class="search-box">
                <i class='bx bx-search'></i>
                <input type="text" placeholder="Поиск">
            </div>
            <i class='bx bx-scan' style="font-size: 26px; color: var(--text-muted);"></i>
        </header>

        <div class="wallet-card">
            <div class="wallet-selector-container">
                <div class="wallet-pill" onclick="toggleModal()">
                    Основной кошелек <i class='bx bx-chevron-right'></i>
                    <div class="status-dot" style="top: -4px; right: -4px;"></div>
                </div>
                <i class='bx bx-copy-alt copy-icon'></i>
            </div>
            <div class="main-balance" id="val-main">0,00 $</div>
            <div class="sub-balance down" id="val-sub">0,00 $ (0.00%)</div>
        </div>

        <div class="actions-row">
            <div class="action-btn-wrap">
                <div class="btn-circle"><i class='bx bx-up-arrow-alt' style="transform: rotate(45deg);"></i></div>
                <span class="btn-label">Отпр...</span>
            </div>
            <div class="action-btn-wrap">
                <div class="btn-circle"><i class='bx bx-down-arrow-alt'></i></div>
                <span class="btn-label">Полу...</span>
            </div>
            <div class="action-btn-wrap">
                <div class="btn-circle"><i class='bx bx-refresh'></i></div>
                <span class="btn-label">Обмен</span>
            </div>
            <div class="action-btn-wrap">
                <div class="btn-circle green"><i class='bx bx-plus'></i></div>
                <span class="btn-label">Поку...</span>
            </div>
        </div>

        <div class="tabs-header">
            <div class="tab">Криптовалюта</div>
            <div class="tab active">Избранное</div>
            <div class="tab">NFT</div>
            <div class="tab-tools">
                <i class='bx bx-history'></i>
                <i class='bx bx-slider-alt'></i>
            </div>
        </div>

        <div id="coin-list-container"></div>

        <a href="#" class="view-all view-tokens">Просмотреть токены</a>
        <div class="earn-section">Заработок <i class='bx bx-chevron-right'></i></div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-link active"><i class='bx bxs-home-alt-2'></i><span>Главная</span></a>
        <a href="#" class="nav-link"><i class='bx bx-trending-up'></i><span>Популярные</span></a>
        <div class="nav-link" style="flex: 0.6;">
            <div class="trade-center"><i class='bx bx-transfer'></i></div>
            <span style="margin-top: 5px;">Торговать</span>
        </div>
        <a href="#" class="nav-link"><i class='bx bx-gift'></i><span>Награды</span></a>
        <a href="#" class="nav-link"><i class='bx bx-compass'></i><span>Подробнее</span></a>
    </nav>

    <div id="modal-overlay" onclick="toggleModal()">
        <div class="modal-body" onclick="event.stopPropagation()">
            <h2 style="font-size: 22px;">Изменить баланс</h2>
            <p style="color: #777; margin-top: 5px;">Введите сумму USDT</p>
            <input type="number" id="input-bal" placeholder="0.00">
            <button onclick="applyBal()">Подтвердить</button>
        </div>
    </div>

    <script>
        let walletAmount = parseFloat(localStorage.getItem('saved_bal')) || 0;

        function toggleModal() {
            const m = document.getElementById('modal-overlay');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        function applyBal() {
            const v = document.getElementById('input-bal').value;
            if(v !== "") {
                walletAmount = parseFloat(v);
                localStorage.setItem('saved_bal', walletAmount);
                refreshData();
                toggleModal();
            }
        }

        async function refreshData() {
            const formatter = new Intl.NumberFormat('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            document.getElementById('val-main').innerText = formatter.format(walletAmount) + " $";

            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=tether,bitcoin,ethereum,solana,binancecoin&vs_currencies=usd&include_24hr_change=true&include_market_cap=true');
                const data = await res.json();

                // Обновление баланса USDT
                const usdtChange = data.tether.usd_24h_change;
                const changeUsd = (walletAmount * (usdtChange / 100));
                const sign = changeUsd >= 0 ? '+' : '';
                const subEl = document.getElementById('val-sub');
                subEl.innerText = `${sign}${changeUsd.toFixed(2)} $ (${sign}${usdtChange.toFixed(2)}%)`;
                subEl.className = `sub-balance ${usdtChange >= 0 ? 'up' : 'down'}`;

                // Список монет как на скрине
                const coins = [
                    {id: 'solana', sym: 'SOL', icon: 'https://assets.coingecko.com/coins/images/4128/small/solana.png'},
                    {id: 'ethereum', sym: 'ETH', icon: 'https://assets.coingecko.com/coins/images/279/small/ethereum.png'},
                    {id: 'bitcoin', sym: 'BTC', icon: 'https://assets.coingecko.com/coins/images/1/small/bitcoin.png'},
                    {id: 'binancecoin', sym: 'BNB', icon: 'https://assets.coingecko.com/coins/images/825/small/bnb-icon2_2x.png'}
                ];

                const container = document.getElementById('coin-list-container');
                container.innerHTML = '';

                coins.forEach(c => {
                    const d = data[c.id];
                    const isUp = d.usd_24h_change >= 0;
                    const mcapVal = d.usd_market_cap > 1e9 ? (d.usd_market_cap/1e9).toFixed(2) + ' $B' : (d.usd_market_cap/1e6).toFixed(2) + ' $M';
                    
                    container.innerHTML += `
                        <div class="coin-row">
                            <div class="coin-left">
                                <img src="${c.icon}" class="coin-img">
                                <div class="coin-name-wrap">
                                    <span class="coin-symbol">${c.sym}</span>
                                    <span class="coin-mcap">${mcapVal}</span>
                                </div>
                            </div>
                            <div class="coin-right">
                                <span class="coin-price">${formatter.format(d.usd)} $</span>
                                <span class="coin-pct ${isUp ? 'up' : 'down'}">${isUp ? '+' : ''}${d.usd_24h_change.toFixed(2)}%</span>
                            </div>
                        </div>
                    `;
                });
            } catch (err) { console.error("API Error"); }
        }

        refreshData();
        setInterval(refreshData, 20000);
    </script>
</body>
</html>
