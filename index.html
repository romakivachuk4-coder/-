<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trust Wallet Perfect UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0b0b;
            --surface: #191919;
            --accent: #31f37a;
            --text-main: #ffffff;
            --text-muted: #8e8e8e;
            --red: #ff4d4d;
            --green: #31f37a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; }
        
        .app-container { width: 100%; max-width: 480px; padding-bottom: 150px; }

        /* Header */
        .header { display: flex; align-items: center; padding: 12px 16px; gap: 12px; position: sticky; top: 0; background: var(--bg-color); z-index: 20; }
        .icon-btn { position: relative; font-size: 26px; display: flex; align-items: center; }
        .dot-notify { position: absolute; top: 1px; right: 1px; width: 9px; height: 9px; background: var(--red); border-radius: 50%; border: 2px solid var(--bg-color); }

        .search-bar { flex-grow: 1; background: var(--surface); border-radius: 14px; display: flex; align-items: center; padding: 10px 14px; gap: 8px; }
        .search-bar input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 17px; }
        .search-bar i { color: var(--text-muted); font-size: 20px; }

        /* Wallet Section */
        .wallet-card { text-align: center; padding: 20px 0 10px; }
        .wallet-selector { 
            display: inline-flex; align-items: center; gap: 4px; 
            background: #1e1e1e; padding: 6px 14px; border-radius: 20px; 
            font-size: 14px; font-weight: 600; margin-bottom: 12px; position: relative;
        }
        .dot-wallet { position: absolute; top: -2px; right: 40px; width: 8px; height: 8px; background: var(--red); border-radius: 50%; }
        
        .main-balance { font-size: 52px; font-weight: 700; letter-spacing: -1px; margin-bottom: 2px; }
        .sub-balance { font-size: 16px; font-weight: 600; color: var(--text-muted); }

        /* Actions */
        .actions { display: flex; justify-content: space-between; padding: 25px 20px; gap: 10px; }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1; }
        .action-btn { width: 62px; height: 62px; border-radius: 18px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .action-btn.green-btn { background: var(--accent); color: #000; }
        .action-label { font-size: 13px; font-weight: 600; }

        /* Tabs */
        .tabs { display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid #1a1a1a; margin-top: 5px; }
        .tab { padding: 14px 12px; color: #555; font-weight: 700; font-size: 15px; }
        .tab.active { color: #fff; position: relative; }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 10px; right: 10px; height: 3px; background: var(--accent); border-radius: 10px; }
        .tab-icons { margin-left: auto; display: flex; gap: 18px; color: var(--text-muted); font-size: 22px; }

        /* Crypto List */
        .crypto-list { padding: 0 16px; }
        .crypto-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; }
        .c-left { display: flex; align-items: center; gap: 12px; }
        .c-icon { width: 42px; height: 42px; border-radius: 50%; }
        .c-name { font-weight: 700; font-size: 17px; display: block; margin-bottom: 2px; }
        .c-mcap { font-size: 13px; color: var(--text-muted); font-weight: 500; }
        .c-right { text-align: right; }
        .c-price { font-weight: 700; font-size: 17px; display: block; margin-bottom: 2px; }
        .c-change { font-size: 13px; font-weight: 600; }

        .view-all { text-align: center; color: var(--accent); font-weight: 700; padding: 25px; display: block; text-decoration: none; font-size: 15px; }
        .earn-header { display: flex; justify-content: space-between; padding: 16px; font-weight: 700; font-size: 20px; align-items: center; }

        /* Nav Bar - Скорректировано по фото */
        .nav-container { position: fixed; bottom: 25px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .bottom-nav { 
            width: 92%; max-width: 420px; background: rgba(26, 26, 26, 0.95); 
            border-radius: 40px; height: 82px; display: flex; align-items: center; 
            padding: 0 10px; border: 1px solid #252525; backdrop-filter: blur(10px);
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); text-decoration: none; position: relative; }
        
        /* Активная подложка "Главная" */
        .nav-item.active .pill { 
            background: rgba(49, 243, 122, 0.15); width: 85%; height: 60px; 
            position: absolute; top: 50%; transform: translateY(-50%); border-radius: 30px; z-index: -1; 
        }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 26px; }
        .nav-label { font-size: 11px; font-weight: 600; }

        /* Центральная кнопка Торговать */
        .trade-btn { 
            background: var(--accent); width: 58px; height: 58px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: #000; font-size: 32px; position: absolute; top: -30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .up { color: var(--green); }
        .down { color: var(--red); }

        /* Modal */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1c1c1c; padding: 25px; border-radius: 25px; width: 80%; text-align: center; }
        .modal-content input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; border: none; background: #000; color: #fff; font-size: 20px; text-align: center; }
        .modal-content button { background: var(--accent); border: none; padding: 12px 25px; border-radius: 12px; font-weight: 700; width: 100%; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <div class="icon-btn"><i class='bx bx-cog'></i><div class="dot-notify"></div></div>
            <div class="search-bar"><i class='bx bx-search'></i><input type="text" placeholder="Поиск"></div>
            <i class='bx bx-scan' style="font-size: 26px;"></i>
        </header>

        <div class="wallet-card">
            <div class="wallet-selector" onclick="openModal()">
                <div class="dot-wallet"></div>
                Основной кошелек <i class='bx bx-chevron-right'></i>
            </div>
            <div class="main-balance" id="balance-main">0,00 $</div>
            <div class="sub-balance" id="balance-sub">0,00 $ (0.00%)</div>
        </div>

        <div class="actions">
            <div class="action-item"><div class="action-btn"><i class='bx bx-up-arrow-alt' style="transform: rotate(45deg);"></i></div><span class="action-label">Отпр...</span></div>
            <div class="action-item"><div class="action-btn"><i class='bx bx-down-arrow-alt'></i></div><span class="action-label">Полу...</span></div>
            <div class="action-item"><div class="action-btn"><i class='bx bx-refresh'></i></div><span class="action-label">Обмен</span></div>
            <div class="action-item"><div class="action-btn green-btn"><i class='bx bx-plus'></i></div><span class="action-label">Поку...</span></div>
        </div>

        <div class="tabs">
            <div class="tab">Криптовалюта</div>
            <div class="tab active">Избранное</div>
            <div class="tab">NFT</div>
            <div class="tab-icons"><i class='bx bx-time-five'></i><i class='bx bx-slider-alt' style="transform: rotate(90deg);"></i></div>
        </div>

        <div class="crypto-list" id="list"></div>
        <a href="#" class="view-all">Просмотреть токены</a>
        <div class="earn-header">Заработок <i class='bx bx-chevron-right' style="color: #444;"></i></div>
    </div>

    <div class="nav-container">
        <nav class="bottom-nav">
            <a href="#" class="nav-item active">
                <div class="pill"></div>
                <i class='bx bxs-home-alt-2'></i>
                <span class="nav-label">Главная</span>
            </a>
            <a href="#" class="nav-item">
                <i class='bx bx-trending-up'></i>
                <span class="nav-label">Популярные</span>
            </a>
            <div class="nav-item" style="overflow: visible;">
                <div class="trade-btn"><i class='bx bx-transfer'></i></div>
                <span class="nav-label" style="margin-top: 38px;">Торговать</span>
            </div>
            <a href="#" class="nav-item">
                <i class='bx bx-gift'></i>
                <span class="nav-label">Награды</span>
            </a>
            <a href="#" class="nav-item">
                <i class='bx bx-compass'></i>
                <span class="nav-label">Подробнее</span>
            </a>
        </nav>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 10px;">Введите баланс USDT</h3>
            <input type="number" id="input-val" placeholder="0">
            <button onclick="save()">Подтвердить</button>
        </div>
    </div>

    <script>
        let count = localStorage.getItem('u_c') || 0;
        
        function openModal() { document.getElementById('modal').style.display='flex'; }
        function closeModal() { document.getElementById('modal').style.display='none'; }
        function save() {
            count = document.getElementById('input-val').value;
            localStorage.setItem('u_c', count);
            update();
            closeModal();
        }

        async function update() {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=tether,solana,ethereum,bitcoin,binancecoin&vs_currencies=usd&include_24hr_change=true&include_market_cap=true');
            const data = await res.json();
            
            const mainUsd = count * data.tether.usd;
            const change = data.tether.usd_24h_change;
            const diff = mainUsd * (change / 100);

            document.getElementById('balance-main').innerText = mainUsd.toLocaleString('ru-RU', {minimumFractionDigits:2}) + " $";
            const sub = document.getElementById('balance-sub');
            sub.innerText = `${diff >= 0 ? '+' : ''}${diff.toFixed(2)} $ (${change.toFixed(2)}%)`;
            sub.className = `sub-balance ${change >= 0 ? 'up' : 'down'}`;

            const coins = [
                {id:'solana', s:'SOL', img:'https://assets.coingecko.com/coins/images/4128/small/solana.png'},
                {id:'ethereum', s:'ETH', img:'https://assets.coingecko.com/coins/images/279/small/ethereum.png'},
                {id:'bitcoin', s:'BTC', img:'https://assets.coingecko.com/coins/images/1/small/bitcoin.png'},
                {id:'binancecoin', s:'BNB', img:'https://assets.coingecko.com/coins/images/825/small/bnb-icon2_2x.png'}
            ];

            let html = '';
            coins.forEach(c => {
                const d = data[c.id];
                html += `
                <div class="crypto-item">
                    <div class="c-left">
                        <img src="${c.img}" class="c-icon">
                        <div><span class="c-name">${c.s}</span><span class="c-mcap">${(d.usd_market_cap/1e9).toFixed(2)} $B</span></div>
                    </div>
                    <div class="c-right">
                        <span class="c-price">${d.usd.toLocaleString()} $</span>
                        <span class="c-change ${d.usd_24h_change >= 0 ? 'up' : 'down'}">${d.usd_24h_change >= 0 ? '+' : ''}${d.usd_24h_change.toFixed(2)}%</span>
                    </div>
                </div>`;
            });
            document.getElementById('list').innerHTML = html;
        }
        update();
        setInterval(update, 15000);
    </script>
</body>
</html>
