<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trust Wallet UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0b0b;
            --surface: #1c1c1e;
            --accent: #38f37b;
            --muted: #8e8e93;
            --red-dot: #ff453a;
            --search-bg: #1c1c1e;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Inter', -apple-system, sans-serif; 
        }

        body { 
            background-color: var(--bg); 
            color: #fff; 
            display: flex; justify-content: center; 
        }
        
        .app { width: 100%; max-width: 430px; min-height: 100vh; }

        /* --- ВЕРХНЕЕ МЕНЮ (КОПИЯ ПО СКРИНШОТУ) --- */
        .header-main {
            padding: 10px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: var(--bg);
        }

        .header-top-row {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Иконка шестеренки с красной точкой */
        .icon-container {
            position: relative;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .settings-icon { font-size: 26px; color: #fff; }
        
        .notification-dot {
            position: absolute;
            width: 9px;
            height: 9px;
            background-color: var(--red-dot);
            border-radius: 50%;
            top: -2px;
            right: -3px;
            border: 1.5px solid var(--bg);
        }

        /* Поле поиска */
        .search-bar {
            flex: 1;
            background: var(--search-bg);
            border-radius: 12px;
            margin: 0 15px;
            display: flex;
            align-items: center;
            padding: 8px 12px;
            gap: 8px;
        }

        .search-bar i { color: var(--muted); font-size: 18px; }
        .search-bar input {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 17px;
            width: 100%;
            outline: none;
        }
        .search-bar input::placeholder { color: var(--muted); }

        .scan-icon { font-size: 26px; color: #fff; cursor: pointer; }

        /* Выбор кошелька */
        .wallet-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .wallet-pill {
            background: var(--surface);
            padding: 5px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 15px;
            font-weight: 600;
            position: relative;
            cursor: pointer;
        }

        .wallet-pill i { font-size: 16px; color: var(--muted); }

        .wallet-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: var(--red-dot);
            border-radius: 50%;
            top: 2px;
            right: 8px;
        }

        .multi-wallet {
            font-size: 20px;
            color: #fff;
            opacity: 0.9;
            cursor: pointer;
        }

        /* --- БАЛАНС --- */
        .balance-container { text-align: center; padding: 25px 0; }
        .main-amount { font-size: 52px; font-weight: 700; letter-spacing: -1px; margin-bottom: 4px; }
        .sub-amount { color: var(--muted); font-size: 16px; font-weight: 500; }

        /* --- КНОПКИ ДЕЙСТВИЙ --- */
        .action-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 0 16px 25px;
        }

        .action-box { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .btn-circle {
            width: 100%;
            aspect-ratio: 1/0.85;
            background: var(--surface);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }
        .btn-circle.green { background: var(--accent); color: #000; }
        .action-label { font-size: 13px; font-weight: 500; color: #fff; }

        /* --- СПИСОК --- */
        .tabs { 
            display: flex; 
            padding: 0 16px; 
            gap: 20px; 
            border-bottom: 0.5px solid #222; 
            margin-bottom: 12px; 
        }
        .tab { padding: 12px 0; color: var(--muted); font-weight: 600; font-size: 16px; position: relative; }
        .tab.active { color: #fff; }
        .tab.active::after { 
            content: ''; position: absolute; bottom: -1.5px; left: 0; right: 0; 
            height: 3px; background: var(--accent); border-radius: 4px; 
        }

        .coin { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; }
        .coin-l { display: flex; align-items: center; gap: 12px; }
        .coin-icon { width: 40px; height: 40px; border-radius: 50%; }
        .coin-name { font-weight: 600; font-size: 17px; }
        .coin-cap { font-size: 13px; color: var(--muted); }
        .coin-r { text-align: right; }
        .price { font-weight: 600; font-size: 17px; }
        .change { font-size: 13px; font-weight: 500; }
        .up { color: var(--accent); }
        .down { color: var(--red-dot); }

    </style>
</head>
<body>

    <div class="app">
        <header class="header-main">
            <div class="header-top-row">
                <div class="icon-container">
                    <i class='bx bx-cog settings-icon'></i>
                    <div class="notification-dot"></div>
                </div>
                
                <div class="search-bar">
                    <i class='bx bx-search'></i>
                    <input type="text" placeholder="Поиск">
                </div>

                <i class='bx bx-scan scan-icon'></i>
            </div>

            <div class="wallet-row">
                <div class="wallet-pill">
                    Основной кошелек
                    <i class='bx bx-chevron-right'></i>
                    <div class="wallet-dot"></div>
                </div>
                <i class='bx bx-copy-alt multi-wallet'></i>
            </div>
        </header>

        <div class="balance-container">
            <div class="main-amount">0,00 $</div>
            <div class="sub-amount">0,00 $ (0.00%)</div>
        </div>

        <div class="action-row">
            <div class="action-box">
                <div class="btn-circle"><i class='bx bx-up-arrow-alt' style="transform: rotate(45deg);"></i></div>
                <span class="action-label">Отпр...</span>
            </div>
            <div class="action-box">
                <div class="btn-circle"><i class='bx bx-down-arrow-alt'></i></div>
                <span class="action-label">Полу...</span>
            </div>
            <div class="action-box">
                <div class="btn-circle"><i class='bx bx-refresh'></i></div>
                <span class="action-label">Обмен</span>
            </div>
            <div class="action-box">
                <div class="btn-circle green"><i class='bx bx-plus'></i></div>
                <span class="action-label">Поку...</span>
            </div>
        </div>

        <div class="tabs">
            <div class="tab">Криптовалюта</div>
            <div class="tab active">Избранное</div>
            <div class="tab">NFT</div>
        </div>

        <div class="coin">
            <div class="coin-l">
                <img src="https://assets.coingecko.com/coins/images/4128/small/solana.png" class="coin-icon">
                <div>
                    <div class="coin-name">SOL</div>
                    <div class="coin-cap">2,74 $B</div>
                </div>
            </div>
            <div class="coin-r">
                <div class="price">86,45 $</div>
                <div class="change down">-0.12%</div>
            </div>
        </div>

        <div class="coin">
            <div class="coin-l">
                <img src="https://assets.coingecko.com/coins/images/279/small/ethereum.png" class="coin-icon">
                <div>
                    <div class="coin-name">ETH</div>
                    <div class="coin-cap">7,92 $B</div>
                </div>
            </div>
            <div class="coin-r">
                <div class="price">2 346,91 $</div>
                <div class="change up">+1.29%</div>
            </div>
        </div>

        <div style="text-align: center; color: var(--accent); font-weight: 600; padding: 20px; font-size: 15px;">
            Просмотреть токены
        </div>

        <div style="display: flex; justify-content: space-between; padding: 15px 16px; font-weight: 700; font-size: 19px;">
            Заработок <i class='bx bx-chevron-right'></i>
        </div>
    </div>

</body>
</html>
