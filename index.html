<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trust Wallet Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0b0b;
            --surface: #1c1c1e;
            --accent: #38f37b;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --red: #ff453a;
            --green: #32d74b;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Inter', -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            display: flex; justify-content: center; 
            overflow-x: hidden; 
        }
        
        .app-container { width: 100%; max-width: 430px; padding-bottom: 120px; }

        /* --- Header --- */
        .header { 
            display: flex; align-items: center; padding: 12px 16px; gap: 14px;
            position: sticky; top: 0; background: var(--bg-color); z-index: 10;
        }
        .header i { font-size: 26px; }
        .search-bar { 
            flex-grow: 1; background: var(--surface); border-radius: 12px; 
            display: flex; align-items: center; padding: 8px 12px; gap: 8px;
        }
        .search-bar input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 17px; }
        .search-bar i { color: var(--text-muted); font-size: 20px; }

        /* --- Wallet --- */
        .wallet-card { text-align: center; padding: 10px 0 25px; }
        .wallet-selector { 
            display: inline-flex; align-items: center; gap: 4px; 
            background: var(--surface); padding: 6px 14px; border-radius: 20px; 
            font-size: 15px; font-weight: 600; margin-bottom: 12px; cursor: pointer;
        }
        .main-balance { font-size: 48px; font-weight: 700; letter-spacing: -1px; }
        .sub-balance { font-size: 16px; margin-top: 2px; font-weight: 500; color: var(--text-muted); }

        /* --- Actions (Кнопки как на скрине) --- */
        .actions { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px; 
            padding: 0 16px 25px; 
        }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .action-btn { 
            width: 100%; aspect-ratio: 1.2 / 1; border-radius: 18px; 
            background: var(--surface); display: flex; align-items: center; 
            justify-content: center; font-size: 28px; 
        }
        .action-btn.green-btn { background: var(--accent); color: #000; }
        .action-label { font-size: 13px; font-weight: 500; color: #fff; }

        /* --- Tabs --- */
        .tabs { display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid #222; margin-bottom: 10px; }
        .tab { padding: 12px 0; color: var(--text-muted); font-weight: 600; font-size: 16px; margin-right: 20px; position: relative; }
        .tab.active { color: #fff; }
        .tab.active::after { 
            content: ''; position: absolute; bottom: -1px; left: 0; right: 0; 
            height: 3px; background: var(--accent); border-radius: 4px; 
        }
        .tab-icons { margin-left: auto; display: flex; gap: 20px; color: var(--text-muted); font-size: 22px; }

        /* --- Crypto List --- */
        .crypto-list { padding: 0 16px; }
        .crypto-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; }
        .c-left { display: flex; align-items: center; gap: 14px; }
        .c-icon { width: 42px; height: 42px; border-radius: 50%; object-fit: contain; }
        .c-name { font-weight: 600; font-size: 17px; color: #fff; display: block; }
        .c-mcap { font-size: 14px; color: var(--text-muted); }
        .c-right { text-align: right; }
        .c-price { font-weight: 600; font-size: 17px; color: #fff; display: block; margin-bottom: 2px; }
        .c-change { font-size: 14px; font-weight: 500; }
        
        .up { color: var(--green) !important; }
        .down { color: var(--red) !important; }

        .view-all { text-align: center; color: var(--accent); font-weight: 600; padding: 25px; display: block; text-decoration: none; font-size: 16px; }
        .earn-header { display: flex; justify-content: space-between; padding: 10px 16px; font-weight: 700; font-size: 19px; }

        /* --- Bottom Nav (Floating style) --- */
        .bottom-nav { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 92%; max-width: 400px; background: rgba(26, 26, 26, 0.95); 
            border-radius: 40px; height: 75px; display: flex; justify-content: space-around; 
            align-items: center; padding: 0 10px; z-index: 100; border: 1px solid #2a2a2a; 
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); text-decoration: none; gap: 4px; flex: 1; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 26px; }
        .nav-label { font-size: 11px; font-weight: 500; }
        
        .trade-circle { 
            background: var(--accent); width: 52px; height: 52px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: #000; font-size: 26px; margin-bottom: -10px;
            box-shadow: 0 4px 12px rgba(56, 243, 123, 0.3);
        }

        /* --- Modal --- */
        #modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 200; display: none; 
            justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .modal { 
            background: var(--surface); padding: 25px; border-radius: 24px; 
            width: 85%; max-width: 320px; text-align: center;
        }
        .modal h3 { margin-bottom: 15px; }
        .modal input { 
            width: 100%; padding: 14px; border-radius: 12px; border: none; 
            background: #000; color: #fff; margin-bottom: 15px; outline: none; 
            font-size: 24px; text-align: center; 
        }
        .modal button { 
            background: var(--accent); color: #000; border: none; padding: 14px; 
            border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <i class='bx bx-cog'></i>
            <div class="search-bar">
                <i class='bx bx-search'></i>
                <input type="text" placeholder="Поиск">
            </div>
            <i class='bx bx-scan'></i>
        </header>

        <div class="wallet-card">
            <div class="wallet-selector" onclick="openMenu()">Основной кошелек <i class='bx bx-chevron-right'></i></div>
            <div class="main-balance" id="display-balance">0,00 $</div>
            <div class="sub-balance" id="display-sub">0,00 $ (0.00%)</div>
        </div>

        <div class="actions">
            <div class="action-item">
                <div class="action-btn"><i class='bx bx-up-arrow-alt' style="transform: rotate(45deg);"></i></div>
                <span class="action-label">Отпр...</span>
            </div>
            <div class="action-item">
                <div class="action-btn"><i class='bx bx-down-arrow-alt'></i></div>
                <span class="action-label">Полу...</span>
            </div>
            <div class="action-item">
                <div class="action-btn"><i class='bx bx-refresh'></i></div>
                <span class="action-label">Обмен</span>
            </div>
            <div class="action-item">
                <div class="action-btn green-btn"><i class='bx bx-plus'></i></div>
                <span class="action-label">Поку...</span>
            </div>
        </div>

        <div class="tabs">
            <div class="tab">Криптовалюта</div>
            <div class="tab active">Избранное</div>
            <div class="tab">NFT</div>
            <div class="tab-icons"><i class='bx bx-history'></i><i class='bx bx-slider-alt'></i></div>
        </div>

        <div class="crypto-list" id="crypto-container"></div>

        <a href="#" class="view-all">Просмотреть токены</a>
        <div class="earn-header">Заработок <i class='bx bx-chevron-right'></i></div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><i class='bx bxs-home-alt-2'></i><span class="nav-label">Главная</span></a>
        <a href="#" class="nav-item"><i class='bx bx-trending-up'></i><span class="nav-label">Популярные</span></a>
        <div class="nav-item">
            <div class="trade-circle"><i class='bx bx-transfer'></i></div>
            <span class="nav-label" style="margin-top:15px">Торговать</span>
        </div>
        <a href="#" class="nav-item"><i class='bx bx-gift'></i><span class="nav-label">Награды</span></a>
        <a href="javascript:void(0)" class="nav-item" onclick="openMenu()">
            <i class='bx bx-compass'></i><span class="nav-label">Подробнее</span>
        </a>
    </nav>

    <div id="modal-overlay" onclick="closeMenu()">
        <div class="modal" onclick="event.stopPropagation()">
            <h3>Количество USDT</h3>
            <input type="number" id="balance-input" placeholder="0.00">
            <button onclick="updateBalance()">Подтвердить</button>
        </div>
    </div>

    <script>
        let usdtHoldings = parseFloat(localStorage.getItem('usdt_count')) || 0;

        function openMenu() { document.getElementById('modal-overlay').style.display = 'flex'; }
        function closeMenu() { document.getElementById('modal-overlay').style.display = 'none'; }

        function updateBalance() {
            const val = document.getElementById('balance-input').value;
            if(val !== "") {
                usdtHoldings = parseFloat(val);
                localStorage.setItem('usdt_count', usdtHoldings);
                fetchPrices();
                closeMenu();
            }
        }

        const coinsConfig = [
            { id: 'solana', symbol: 'SOL', icon: 'https://assets.coingecko.com/coins/images/4128/small/solana.png' },
            { id: 'ethereum', symbol: 'ETH', icon: 'https://assets.coingecko.com/coins/images/279/small/ethereum.png' },
            { id: 'bitcoin', symbol: 'BTC', icon: 'https://assets.coingecko.com/coins/images/1/small/bitcoin.png' },
            { id: 'binancecoin', symbol: 'BNB', icon: 'https://assets.coingecko.com/coins/images/825/small/binance-coin-logo.png' }
        ];

        async function fetchPrices() {
            try {
                const ids = 'tether,' + coinsConfig.map(c => c.id).join(',');
                const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true&include_market_cap=true`);
                const data = await response.json();
                
                const totalUsd = usdtHoldings * data['tether'].usd;
                const usdtChange = data['tether'].usd_24h_change || 0;
                const diffUsd = totalUsd * (usdtChange / 100);

                document.getElementById('display-balance').innerText = 
                    new Intl.NumberFormat('ru-RU', { minimumFractionDigits: 2 }).format(totalUsd) + " $";

                const subEl = document.getElementById('display-sub');
                subEl.innerText = `${diffUsd >= 0 ? '+' : ''}${diffUsd.toFixed(2)} $ (${diffUsd >= 0 ? '+' : ''}${usdtChange.toFixed(2)}%)`;
                subEl.className = `sub-balance ${usdtChange >= 0 ? 'up' : 'down'}`;

                renderList(data);
            } catch (e) { console.error("Ошибка:", e); }
        }

        function renderList(data) {
            const container = document.getElementById('crypto-container');
            container.innerHTML = '';
            coinsConfig.forEach(coin => {
                const c = data[coin.id];
                const isUp = c.usd_24h_change >= 0;
                container.innerHTML += `
                    <div class="crypto-item">
                        <div class="c-left">
                            <img src="${coin.icon}" class="c-icon">
                            <div>
                                <span class="c-name">${coin.symbol}</span>
                                <span class="c-mcap">${(c.usd_market_cap / 1e9).toFixed(2)} $B</span>
                            </div>
                        </div>
                        <div class="c-right">
                            <span class="c-price">${new Intl.NumberFormat('en-US').format(c.usd)} $</span>
                            <span class="c-change ${isUp ? 'up' : 'down'}">${isUp ? '+' : ''}${c.usd_24h_change.toFixed(2)}%</span>
                        </div>
                    </div>
                `;
            });
        }

        fetchPrices();
        setInterval(fetchPrices, 15000);
    </script>
</body>
</html>
