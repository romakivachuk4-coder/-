<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trust Wallet Interface</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;
            --surface-color: #1a1a1a;
            --accent-color: #38f37b;
            --text-main: #ffffff;
            --text-muted: #8e8e8e;
            --negative-color: #ff4d4d;
            --notification-dot: #ff4a4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .app-wrapper {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            padding-bottom: 120px;
            position: relative;
        }

        /* --- ВЕРХНЯЯ ПАНЕЛЬ (HEADER) --- */
        .header {
            display: flex;
            align-items: center;
            padding: 15px 16px;
            gap: 12px;
            position: sticky;
            top: 0;
            background: var(--bg-color);
            z-index: 100;
        }

        .icon-btn-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .notification-dot {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 9px;
            height: 9px;
            background-color: var(--notification-dot);
            border-radius: 50%;
            border: 2px solid var(--bg-color);
        }

        .search-container {
            flex-grow: 1;
            background: var(--surface-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 10px 15px;
            gap: 10px;
        }

        .search-container i {
            color: var(--text-muted);
            font-size: 20px;
        }

        .search-container input {
            background: transparent;
            border: none;
            color: #fff;
            width: 100%;
            outline: none;
            font-size: 16px;
        }

        /* --- БЛОК БАЛАНСА --- */
        .balance-section {
            text-align: center;
            padding: 25px 0;
        }

        .wallet-switcher-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .wallet-pill {
            background: var(--surface-color);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            position: relative;
        }

        .copy-btn {
            color: var(--text-muted);
            font-size: 22px;
            cursor: pointer;
        }

        .main-balance-text {
            font-size: 52px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 4px;
        }

        .change-text {
            font-size: 16px;
            font-weight: 500;
        }

        /* --- КНОПКИ ДЕЙСТВИЙ --- */
        .action-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 10px 0 35px;
        }

        .action-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .round-btn {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            background: var(--surface-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transition: transform 0.1s;
        }

        .round-btn:active { transform: scale(0.95); }

        .round-btn.buy-btn {
            background: var(--accent-color);
            color: #000;
        }

        .action-label {
            font-size: 13px;
            font-weight: 500;
            color: #fff;
        }

        /* --- ТАБЫ И СПИСОК --- */
        .tab-menu {
            display: flex;
            padding: 0 16px;
            border-bottom: 1px solid #1a1a1a;
            margin-bottom: 10px;
        }

        .tab-item {
            padding: 14px 12px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 15px;
            position: relative;
        }

        .tab-item.active {
            color: #fff;
        }

        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 12px;
            right: 12px;
            height: 3px;
            background: var(--accent-color);
            border-radius: 10px;
        }

        .crypto-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
        }

        .coin-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .coin-logo { width: 42px; height: 42px; border-radius: 50%; }

        .coin-symbol { font-weight: 700; font-size: 17px; display: block; }
        .coin-meta { font-size: 13px; color: var(--text-muted); }

        .coin-stats { text-align: right; }
        .coin-price { font-weight: 600; font-size: 17px; display: block; }

        /* --- МОДАЛЬНОЕ ОКНО --- */
        #modal-box {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #1c1c1e;
            padding: 30px;
            border-radius: 24px;
            width: 85%;
            max-width: 340px;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 15px;
            border-radius: 14px;
            margin: 20px 0;
            font-size: 24px;
            text-align: center;
        }

        .modal-content button {
            background: var(--accent-color);
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
        }

        /* --- НИЖНЯЯ НАВИГАЦИЯ --- */
        .bottom-bar {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 400px;
            background: #161616;
            height: 75px;
            border-radius: 40px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 10px;
            gap: 4px;
        }

        .nav-tab.active { color: var(--accent-color); }
        .nav-tab i { font-size: 24px; }

        .up { color: var(--accent-color); }
        .down { color: var(--negative-color); }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <header class="header">
            <div class="icon-btn-wrap">
                <i class='bx bx-cog' style="font-size: 26px;"></i>
                <div class="notification-dot"></div>
            </div>
            <div class="search-container">
                <i class='bx bx-search'></i>
                <input type="text" placeholder="Поиск">
            </div>
            <i class='bx bx-scan' style="font-size: 26px;"></i>
        </header>

        <section class="balance-section">
            <div class="wallet-switcher-row">
                <div class="wallet-pill" onclick="openSettings()">
                    Основной кошелек <i class='bx bx-chevron-right'></i>
                    <div class="notification-dot" style="top: -5px; right: -5px;"></div>
                </div>
                <i class='bx bx-copy-alt copy-btn'></i>
            </div>
            
            <div class="main-balance-text" id="main-val">0,00 $</div>
            <div class="change-text down" id="change-val">0,00 $ (0.00%)</div>
        </section>

        <div class="action-grid">
            <div class="action-column">
                <div class="round-btn"><i class='bx bx-up-arrow-alt' style="transform: rotate(45deg);"></i></div>
                <span class="action-label">Отпр...</span>
            </div>
            <div class="action-column">
                <div class="round-btn"><i class='bx bx-down-arrow-alt'></i></div>
                <span class="action-label">Полу...</span>
            </div>
            <div class="action-column">
                <div class="round-btn"><i class='bx bx-refresh'></i></div>
                <span class="action-label">Обмен</span>
            </div>
            <div class="action-column">
                <div class="round-btn buy-btn"><i class='bx bx-plus'></i></div>
                <span class="action-label">Поку...</span>
            </div>
        </div>

        <div class="tab-menu">
            <div class="tab-item">Криптовалюта</div>
            <div class="tab-item active">Избранное</div>
            <div class="tab-item">NFT</div>
        </div>

        <div id="coin-list">
            </div>
    </div>

    <nav class="bottom-bar">
        <a href="#" class="nav-tab active"><i class='bx bxs-home-alt-2'></i><span>Главная</span></a>
        <a href="#" class="nav-tab"><i class='bx bx-trending-up'></i><span>Популярные</span></a>
        <a href="#" class="nav-tab"><i class='bx bx-transfer' style="background: var(--accent-color); color: #000; padding: 10px; border-radius: 50%; margin-top: -30px; font-size: 26px;"></i><span>Торговать</span></a>
        <a href="#" class="nav-tab"><i class='bx bx-gift'></i><span>Награды</span></a>
        <a href="#" class="nav-tab"><i class='bx bx-compass'></i><span>Подробнее</span></a>
    </nav>

    <div id="modal-box" onclick="closeSettings()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="font-size: 20px;">Настройка баланса</h2>
            <p style="color: #888; font-size: 14px; margin-top: 5px;">Введите сумму в USDT</p>
            <input type="number" id="new-amount" placeholder="200">
            <button onclick="saveBalance()">Подтвердить</button>
        </div>
    </div>

    <script>
        let currentBalance = parseFloat(localStorage.getItem('tw_bal')) || 0;

        function openSettings() { document.getElementById('modal-box').style.display = 'flex'; }
        function closeSettings() { document.getElementById('modal-box').style.display = 'none'; }

        function saveBalance() {
            const val = document.getElementById('new-amount').value;
            if(val) {
                currentBalance = parseFloat(val);
                localStorage.setItem('tw_bal', currentBalance);
                updateUI();
                closeSettings();
            }
        }

        async function updateUI() {
            // Форматирование числа с запятой
            const formatter = new Intl.NumberFormat('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            document.getElementById('main-val').innerText = formatter.format(currentBalance) + " $";
            
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=tether,bitcoin,ethereum,solana&vs_currencies=usd&include_24hr_change=true');
                const data = await res.json();
                
                // Расчет изменения
                const usdtChange = data.tether.usd_24h_change;
                const changeInUsd = (currentBalance * (usdtChange / 100));
                const sign = changeInUsd >= 0 ? '+' : '';
                
                const changeEl = document.getElementById('change-val');
                changeEl.innerText = `${sign}${changeInUsd.toFixed(2)} $ (${sign}${usdtChange.toFixed(2)}%)`;
                changeEl.className = `change-text ${usdtChange >= 0 ? 'up' : 'down'}`;

                // Список монет
                const coins = [
                    { name: 'Tether', sym: 'USDT', id: 'tether', img: 'https://assets.coingecko.com/coins/images/325/small/tether.png' },
                    { name: 'Bitcoin', sym: 'BTC', id: 'bitcoin', img: 'https://assets.coingecko.com/coins/images/1/small/bitcoin.png' },
                    { name: 'Ethereum', sym: 'ETH', id: 'ethereum', img: 'https://assets.coingecko.com/coins/images/279/small/ethereum.png' }
                ];

                const listWrap = document.getElementById('coin-list');
                listWrap.innerHTML = '';
                coins.forEach(c => {
                    const cData = data[c.id];
                    listWrap.innerHTML += `
                        <div class="crypto-item">
                            <div class="coin-info">
                                <img src="${c.img}" class="coin-logo">
                                <div>
                                    <span class="coin-symbol">${c.sym}</span>
                                    <span class="coin-meta">${c.name}</span>
                                </div>
                            </div>
                            <div class="coin-stats">
                                <span class="coin-price">${formatter.format(cData.usd)} $</span>
                                <span class="coin-meta ${cData.usd_24h_change >= 0 ? 'up' : 'down'}">
                                    ${cData.usd_24h_change >= 0 ? '+' : ''}${cData.usd_24h_change.toFixed(2)}%
                                </span>
                            </div>
                        </div>
                    `;
                });
            } catch(e) { console.log("API Error"); }
        }

        updateUI();
        setInterval(updateUI, 30000); // Обновление раз в 30 сек
    </script>
</body>
</html>
