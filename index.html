<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trust Wallet Layout Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --accent: #7cf89b; /* Точный цвет кнопки Поку... */
            --muted: #8e8e8e;
            --red: #ff5b5b; /* Точный цвет минусового баланса */
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { background: var(--bg); color: #fff; display: flex; justify-content: center; }

        .app { width: 100%; max-width: 480px; padding-bottom: 130px; }

        /* Анимация при обновлении */
        .updating { animation: pulseUpdate 0.4s ease-out; }
        @keyframes pulseUpdate {
            0% { opacity: 0.7; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Header */
        .header { display: flex; align-items: center; padding: 15px 16px; gap: 12px; }
        .settings-box { position: relative; display: flex; align-items: center; }
        .notif-dot { 
            position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; 
            background: #ff4d4d; border-radius: 50%; border: 1.5px solid var(--bg);
        }

        .search { 
            flex: 1; background: #1c1c1c; border-radius: 14px; 
            display: flex; align-items: center; padding: 10px 14px; gap: 10px; 
        }
        .search i { color: #555; font-size: 20px; }
        .search input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 17px; }

        /* Wallet Section - Как на скриншоте 1 */
        .wallet-sec { text-align: center; padding: 25px 0; }
        .w-pill { 
            display: inline-flex; align-items: center; gap: 6px;
            background: #1c1c1c; padding: 6px 14px; border-radius: 20px; 
            font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 20px;
        }

        .bal-m { font-size: 62px; font-weight: 700; letter-spacing: -1px; line-height: 1; margin-bottom: 8px; }
        .bal-s { font-size: 17px; font-weight: 500; color: var(--red); }

        /* Actions - Квадратные кнопки как на скрине */
        .acts { display: flex; justify-content: center; gap: 24px; padding: 20px 0; }
        .act-i { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .act-b { 
            width: 68px; height: 68px; border-radius: 22px; 
            background: #1c1c1c; display: flex; align-items: center; 
            justify-content: center; font-size: 28px; 
        }
        .act-b.buy { background: var(--accent); color: #000; }
        .act-l { font-size: 14px; font-weight: 600; color: #fff; }

        /* Остальное */
        .tabs { display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid #1a1a1a; margin-top: 10px; }
        .tab { padding: 10px 0; color: #555; font-weight: 700; font-size: 16px; margin-right: 25px; }
        .tab.active { color: #fff; border-bottom: 3px solid var(--accent); }

        /* Bottom Nav */
        .nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: #0d0d0d; height: 85px; display: flex; border-top: 1px solid #1a1a1a; padding: 0 10px; }
        .nav-a { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); text-decoration: none; font-size: 11px; gap: 5px; }
        .nav-a.active { color: #7cf89b; }
        .nav-a i { font-size: 26px; }

        /* Modal */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; display: none; align-items: center; justify-content: center; }
        .m-box { background: #1c1c1c; padding: 30px; border-radius: 25px; width: 85%; text-align: center; }
        .m-box input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 12px; margin: 20px 0; font-size: 24px; text-align: center; }
        .m-box button { background: var(--accent); border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="app">
    <header class="header">
        <div class="settings-box">
            <i class='bx bx-cog' style="font-size: 28px;"></i>
            <div class="notif-dot"></div>
        </div>
        <div class="search">
            <i class='bx bx-search'></i>
            <input type="text" placeholder="Поиск">
        </div>
        <i class='bx bx-scan' style="font-size: 26px;"></i>
    </header>

    <div class="wallet-sec" id="bal-container">
        <div class="w-pill" onclick="openM()">
            Основной кошелек <i class='bx bx-chevron-right'></i>
        </div>
        <div class="bal-m" id="main-bal">200,00 $</div>
        <div class="bal-s" id="sub-bal">-0.02 $ (-0.01%)</div>
    </div>

    <div class="acts">
        <div class="act-i"><div class="act-b"><i class='bx bx-up-arrow-alt' style="transform: rotate(45deg);"></i></div><span class="act-l">Отпр...</span></div>
        <div class="act-i"><div class="act-b"><i class='bx bx-down-arrow-alt'></i></div><span class="act-l">Полу...</span></div>
        <div class="act-i"><div class="act-b"><i class='bx bx-refresh'></i></div><span class="act-l">Обмен</span></div>
        <div class="act-i"><div class="act-b buy"><i class='bx bx-plus'></i></div><span class="act-l">Поку...</span></div>
    </div>

    <div class="tabs">
        <div class="tab">Криптовалюта</div>
        <div class="tab active">Избранное</div>
        <div class="tab">NFT</div>
    </div>
</div>

<nav class="nav">
    <a class="nav-a active"><i class='bx bxs-home-alt-2'></i><span>Главная</span></a>
    <a class="nav-a"><i class='bx bx-trending-up'></i><span>Популярные</span></a>
    <a class="nav-a"><i class='bx bx-transfer-alt' style="background: #7cf89b; color: #000; border-radius: 50%; padding: 8px;"></i><span>Торговать</span></a>
    <a class="nav-a"><i class='bx bx-gift'></i><span>Награды</span></a>
    <a class="nav-a" onclick="openM()"><i class='bx bx-compass'></i><span>Подробнее</span></a>
</nav>

<div id="modal" onclick="closeM()">
    <div class="m-box" onclick="event.stopPropagation()">
        <h3>Установить баланс</h3>
        <input type="number" id="bal-input" placeholder="Введите сумму">
        <button onclick="setBalance()">Сохранить</button>
    </div>
</div>

<script>
    function openM() { document.getElementById('modal').style.display = 'flex'; }
    function closeM() { document.getElementById('modal').style.display = 'none'; }

    function setBalance() {
        const val = document.getElementById('bal-input').value;
        if(val) {
            const mainBal = document.getElementById('main-bal');
            const container = document.getElementById('bal-container');
            
            // Красивое форматирование
            mainBal.innerText = parseFloat(val).toLocaleString('ru-RU', {minimumFractionDigits: 2}) + " $";
            
            // Анимация обновления
            container.classList.remove('updating');
            void container.offsetWidth;
            container.classList.add('updating');
            
            closeM();
        }
    }
</script>

</body>
</html>
