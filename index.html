<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trust Wallet Authentic Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --accent: #38f37b;
            --muted: #8e8e8e;
            --red: #ff4a4a;
            --green: #38f37b;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background: var(--bg); color: #fff; 
            display: flex; justify-content: center; 
            overflow-x: hidden;
        }

        .app { width: 100%; max-width: 480px; padding-bottom: 130px; min-height: 100vh; }

        /* --- HEADER --- */
        .header { 
            display: flex; align-items: center; padding: 12px 16px; gap: 15px; 
            position: sticky; top: 0; background: var(--bg); z-index: 100; 
        }

        .icon-p { position: relative; display: flex; align-items: center; cursor: pointer; }

        .dot { 
            position: absolute; top: -2px; right: -2px; width: 11px; height: 11px; 
            background: var(--red); border-radius: 50%; border: 2px solid var(--bg); 
            box-shadow: 0 0 8px rgba(255, 74, 74, 0.7);
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.15); opacity: 0.9; } 
            100% { transform: scale(1); } 
        }

        .search { 
            flex: 1; background: var(--surface); border-radius: 12px; 
            display: flex; align-items: center; padding: 10px 14px; gap: 10px; 
        }

        .search input { 
            background: transparent; border: none; color: #fff; 
            width: 100%; outline: none; font-size: 16px; 
        }

        /* --- WALLET --- */
        .wallet-sec { text-align: center; padding: 20px 0 30px; }
        .w-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 25px; }
        
        .w-pill { 
            background: var(--surface); padding: 8px 16px; border-radius: 20px; 
            font-size: 14px; font-weight: 600; display: flex; align-items: center; 
            gap: 4px; position: relative; cursor: pointer; transition: 0.2s;
        }
        .w-pill:active { opacity: 0.7; }

        .bal-m { font-size: 54px; font-weight: 700; letter-spacing: -1.5px; margin-bottom: 2px; }
        .bal-s { font-size: 16px; font-weight: 500; }

        /* --- ACTIONS --- */
        .acts { display: flex; justify-content: center; gap: 20px; margin-bottom: 35px; }
        .act-i { display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; }
        
        .act-b { 
            width: 64px; height: 64px; border-radius: 20px; 
            background: var(--surface); display: flex; align-items: center; 
            justify-content: center; font-size: 30px; transition: 0.2s; 
        }

        .act-i:active .act-b { transform: scale(0.9); background: #252525; }
        .act-b.buy { background: #81f7a6; color: #000; }
        .act-l { font-size: 13px; font-weight: 500; }

        /* --- TABS --- */
        .tabs { 
            display: flex; align-items: center; padding: 0 4px; 
            border-bottom: 1px solid #1a1a1a; margin-bottom: 10px; 
        }
        .tab { padding: 14px 12px; color: var(--muted); font-weight: 700; font-size: 15px; cursor: pointer; }
        .tab.active { color: #fff; position: relative; }
        .tab.active::after { 
            content: ''; position: absolute; bottom: 0; left: 12px; right: 12px; 
            height: 3px; background: var(--accent); border-radius: 2px; 
        }

        .t-tools { margin-left: auto; display: flex; gap: 18px; color: var(--muted); padding-right: 16px; }

        /* --- CRYPTO LIST --- */
        .coin { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 14px 16px; transition: background 0.2s; cursor: pointer;
        }
        .coin:active { background: #151515; }

        .c-l { display: flex; align-items: center; gap: 14px; }
        
        .c-img { 
            width: 42px; height: 42px; border-radius: 50%; 
            object-fit: cover; background: #222;
        }

        .c-sym { font-weight: 700; font-size: 17px; }
        .c-cap { font-size: 13px; color: var(--muted); margin-top: 1px; }
        .c-r { text-align: right; }
        .c-pr { font-weight: 600; font-size: 17px; margin-bottom: 2px; }
        .c-pct { font-size: 13px; font-weight: 500; }

        /* --- BOTTOM NAV --- */
        .nav { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 92%; max-width: 420px; background: #161616; border-radius: 40px; 
            height: 76px; display: flex; align-items: center; border: 1px solid #252525; 
            z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.7); 
        }

        .nav-a { flex: 1; display: flex; flex-direction: column; align-items: center; color: var(--muted); text-decoration: none; font-size: 10px; gap: 4px; }
        .nav-a.active { color: var(--accent); }
        .nav-a i { font-size: 24px; }

        .tr-c { 
            width: 54px; height: 54px; background: var(--accent); 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; color: #000; font-size: 26px; 
            margin-top: -42px; border: 4px solid var(--bg); 
        }

        /* --- MODAL --- */
        #modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.92); 
            z-index: 2000; display: none; align-items: center; 
            justify-content: center; backdrop-filter: blur(12px); 
        }
        .m-box { 
            background: #1c1c1e; padding: 30px; border-radius: 28px; 
            width: 85%; max-width: 340px; text-align: center; border: 1px solid #333; 
        }
        .m-box h3 { margin-bottom: 10px; font-size: 20px; }
        .m-box input { 
            width: 100%; background: #000; border: 1px solid #333; color: #fff; 
            padding: 18px; border-radius: 14px; margin: 20px 0; 
            font-size: 32px; text-align: center; outline: none; 
        }
        .m-box button { 
            background: var(--accent); border: none; width: 100%; 
            padding: 16px; border-radius: 14px; font-weight: 700; 
            font-size: 16px; color: #000; cursor: pointer; 
        }

        .up { color: var(--green); }
        .down { color: var(--red); }
    </style>
</head>
<body>

<div class="app">
    <header class="header">
        <div class="icon-p"><i class='bx bx-cog' style="font-size: 26px;"></i><div class="dot"></div></div>
        <div class="search"><i class='bx bx-search'></i><input type="text" placeholder="Поиск"></div>
        <i class='bx bx-scan' style="font-size: 26px; color: var(--muted); cursor: pointer;"></i>
    </header>

    <div class="wallet-sec">
        <div class="w-row">
            <div class="w-pill" onclick="toggleM(1)">
                Основной кошелек <i class='bx bx-chevron-right'></i>
                <div class="dot" style="top:-5px; right:-5px;"></div>
            </div>
            <i class='bx bx-copy-alt' style="color: var(--muted); font-size: 22px; cursor: pointer;"></i>
        </div>
        <div class="bal-m" id="main-bal">0,00 $</div>
        <div class="bal-s" id="sub-bal">0,00 $ (0.00%)</div>
    </div>

    <div class="acts">
        <div class="act-i"><div class="act-b"><i class='bx bx-up-arrow-alt' style="transform: rotate(45deg);"></i></div><span class="act-l">Отпр...</span></div>
        <div class="act-i"><div class="act-b"><i class='bx bx-down-arrow-alt'></i></div><span class="act-l">Полу...</span></div>
        <div class="act-i"><div class="act-b"><i class='bx bx-refresh'></i></div><span class="act-l">Обмен</span></div>
        <div class="act-i"><div class="act-b buy"><i class='bx bx-plus'></i></div><span class="act-l">Поку...</span></div>
    </div>

    <div class="tabs">
        <div class="tab">Криптовалюта</div>
        <div class="tab active">Избранное</div>
        <div class="tab">NFT</div>
        <div class="t-tools">
            <i class='bx bx-history'></i>
            <i class='bx bx-slider-alt' style="font-size: 22px;"></i>
        </div>
    </div>

    <div id="coin-list">
        </div>

    <div style="text-align: center; color: var(--accent); padding: 25px; font-weight: 600; font-size: 15px; cursor: pointer;">Просмотреть токены</div>
    <div style="padding: 10px 16px; font-size: 19px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
        Заработок <i class='bx bx-chevron-right' style="color: var(--muted);"></i>
    </div>
</div>

<nav class="nav">
    <a href="#" class="nav-a active"><i class='bx bxs-home-alt-2'></i><span>Главная</span></a>
    <a href="#" class="nav-a"><i class='bx bx-trending-up'></i><span>Популярные</span></a>
    <div class="nav-a"><div class="tr-c"><i class='bx bx-transfer'></i></div><span style="margin-top:5px">Торговать</span></div>
    <a href="#" class="nav-a"><i class='bx bx-gift'></i><span>Награды</span></a>
    <a href="javascript:void(0)" class="nav-a" onclick="toggleM(1)"><i class='bx bx-compass'></i><span>Подробнее</span></a>
</nav>

<div id="modal" onclick="toggleM(0)">
    <div class="m-box" onclick="event.stopPropagation()">
        <h3>Количество USDT</h3>
        <p style="color: var(--muted); font-size: 13px;">Введите баланс в монетах USDT</p>
        <input type="number" id="bal-input" placeholder="0" step="any">
        <button onclick="saveBal()">Подтвердить</button>
    </div>
</div>

<script>
    // Инициализация данных
    let usdtAmount = parseFloat(localStorage.getItem('usdt_balance')) || 0;

    function toggleM(show) { 
        document.getElementById('modal').style.display = show ? 'flex' : 'none'; 
        if(show) document.getElementById('bal-input').focus();
    }
    
    function saveBal() { 
        let val = document.getElementById('bal-input').value; 
        if(val !== "") { 
            usdtAmount = parseFloat(val); 
            localStorage.setItem('usdt_balance', val); 
            updateData(); 
            toggleM(0); 
        } 
    }

    async function updateData() {
        const formatter = new Intl.NumberFormat('ru-RU', { 
            minimumFractionDigits: 2, 
            maximumFractionDigits: 2 
        });
        
        try {
            // Получаем актуальные цены
            const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=tether,bitcoin,ethereum,solana,binancecoin&vs_currencies=usd&include_24hr_change=true&include_market_cap=true');
            const data = await response.json();
            
            // Расчет главного баланса (на основе введенных USDT)
            const priceUSDT = data.tether.usd;
            const totalUSD = usdtAmount * priceUSDT;
            document.getElementById('main-bal').innerText = formatter.format(totalUSD).replace(/\./g, ',') + " $";

            // Расчет суточного изменения
            const changePercent = data.tether.usd_24h_change;
            const diffUSD = totalUSD - (totalUSD / (1 + changePercent / 100));
            const subLabel = document.getElementById('sub-bal');
            
            subLabel.innerText = `${changePercent >= 0 ? '+' : ''}${diffUSD.toFixed(2)} $ (${changePercent >= 0 ? '+' : ''}${changePercent.toFixed(2)}%)`;
            subLabel.className = `bal-s ${changePercent >= 0 ? 'up' : 'down'}`;

            // Конфигурация списка монет
            const coins = [
                {id:'tether', s:'USDT', img:'https://assets.coingecko.com/coins/images/325/small/tether.png'},
                {id:'solana', s:'SOL', img:'https://assets.coingecko.com/coins/images/4128/small/solana.png'},
                {id:'ethereum', s:'ETH', img:'https://assets.coingecko.com/coins/images/279/small/ethereum.png'},
                {id:'bitcoin', s:'BTC', img:'https://assets.coingecko.com/coins/images/1/small/bitcoin.png'}
            ];

            let listHtml = '';
            coins.forEach(c => {
                const coinData = data[c.id];
                const isPositive = coinData.usd_24h_change >= 0;
                const marketCap = (coinData.usd_market_cap / 1e9).toFixed(2) + ' $B';
                
                listHtml += `
                <div class="coin">
                    <div class="c-l">
                        <img src="${c.img}" class="c-img">
                        <div>
                            <div class="c-sym">${c.s}</div>
                            <div class="c-cap">${marketCap}</div>
                        </div>
                    </div>
                    <div class="c-r">
                        <div class="c-pr">${formatter.format(coinData.usd)} $</div>
                        <div class="c-pct ${isPositive ? 'up' : 'down'}">${isPositive ? '+' : ''}${coinData.usd_24h_change.toFixed(2)}%</div>
                    </div>
                </div>`;
            });
            document.getElementById('coin-list').innerHTML = listHtml;

        } catch (error) {
            console.error("Ошибка при обновлении данных:", error);
        }
    }

    // Запуск
    updateData();
    // Обновление каждые 30 секунд
    setInterval(updateData, 30000);
</script>
</body>
</html>
