<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trust Wallet UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    
    <style>
        :root {
            /* Точные цвета со скриншота */
            --bg-color: #121212;       /* Темный фон приложения */
            --surface: #1c1c1c;        /* Цвет кнопок и полей */
            --accent: #38f37b;         /* Ярко-зеленый Trust */
            --text-main: #ffffff;
            --text-muted: #8e8e8e;
            --red: #ff4d4d;
            --green: #38f37b;
            --nav-bg: #1a1a1a;         /* Цвет плавающей панели */
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
        }

        .app-container {
            width: 100%; max-width: 480px;
            padding-bottom: 120px;
        }

        /* Header */
        .header {
            display: flex; align-items: center; padding: 12px 16px; gap: 12px;
            position: sticky; top: 0; background: var(--bg-color); z-index: 10;
        }
        .search-bar {
            flex-grow: 1; background: var(--surface); border-radius: 14px;
            display: flex; align-items: center; padding: 10px 14px; gap: 8px;
        }
        .search-bar input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 16px; }
        .search-bar i { color: var(--text-muted); font-size: 20px; }

        /* Wallet Section */
        .wallet-card { text-align: center; padding: 20px 0; }
        .wallet-selector {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--surface); padding: 6px 14px; border-radius: 20px;
            font-size: 14px; font-weight: 600; margin-bottom: 15px;
            cursor: pointer;
        }
        .main-balance { font-size: 48px; font-weight: 700; letter-spacing: -0.5px; }
        .sub-balance { color: var(--text-muted); font-size: 15px; margin-top: 4px; font-weight: 500; }

        /* Actions Row */
        .actions { display: flex; justify-content: center; gap: 20px; padding: 20px 0 30px; }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 70px; }
        .action-btn {
            width: 58px; height: 58px; border-radius: 18px;
            background: var(--surface); display: flex; align-items: center; justify-content: center;
            font-size: 28px; transition: 0.2s;
        }
        .action-btn.green-btn { background: var(--accent); color: #000; }
        .action-label { font-size: 13px; font-weight: 500; color: #fff; }

        /* Tabs */
        .tabs {
            display: flex; align-items: center; padding: 0 16px;
            border-bottom: 1px solid #222; margin-bottom: 10px;
        }
        .tab { padding: 12px 12px; color: var(--text-muted); font-weight: 600; font-size: 15px; }
        .tab.active { color: #fff; position: relative; }
        .tab.active::after {
            content: ''; position: absolute; bottom: 0; left: 12px; right: 12px;
            height: 3px; background: var(--accent); border-radius: 4px;
        }
        .tab-icons { margin-left: auto; display: flex; gap: 18px; color: var(--text-muted); font-size: 20px; }

        /* Crypto List */
        .crypto-list { padding: 0 16px; }
        .crypto-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; }
        .c-left { display: flex; align-items: center; gap: 14px; }
        .c-icon { width: 42px; height: 42px; border-radius: 50%; }
        .c-name { font-weight: 700; font-size: 17px; color: #fff; }
        .c-mcap { font-size: 13px; color: var(--text-muted); margin-top: 2px; display: block; }
        .c-right { text-align: right; }
        .c-price { font-weight: 600; font-size: 16px; color: #fff; }
        .c-change { font-size: 13px; font-weight: 500; margin-top: 2px; display: block; }
        .up { color: var(--green); }
        .down { color: var(--red); }

        .view-all { text-align: center; color: var(--accent); font-weight: 600; padding: 25px; display: block; text-decoration: none; font-size: 15px; }

        .earn-header { display: flex; justify-content: space-between; padding: 10px 16px; font-weight: 700; font-size: 19px; }

        /* Floating Navigation Bar */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 420px;
            background: var(--nav-bg); border-radius: 45px; height: 78px;
            display: flex; justify-content: space-around; align-items: center;
            padding: 0 8px; z-index: 100; border: 1px solid #2a2a2a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); text-decoration: none; gap: 4px; flex: 1; }
        .nav-item.active-pill { 
            background: rgba(56, 243, 123, 0.12); /* Затемненный зеленый фон вокруг иконки */
            border-radius: 35px; height: 60px; justify-content: center; color: var(--accent);
        }
        .nav-item i { font-size: 26px; }
        .nav-label { font-size: 11px; font-weight: 500; }
        
        /* Торговать - круглая кнопка */
        .trade-btn-container { position: relative; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .trade-circle {
            background: var(--accent); width: 52px; height: 52px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: #000; font-size: 26px;
            position: absolute; top: -28px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .trade-label { margin-top: 38px; font-size: 11px; color: var(--text-muted); }

        /* Modal */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 200;
            display: none; justify-content: center; align-items: center;
        }
        .modal { background: var(--surface); padding: 30px; border-radius: 28px; width: 85%; max-width: 320px; text-align: center; border: 1px solid #333; }
        .modal h3 { margin-bottom: 10px; }
        .modal input { width: 100%; padding: 15px; border-radius: 14px; border: 1px solid #333; background: #000; color: #fff; margin: 20px 0; outline: none; font-size: 24px; text-align: center; }
        .modal button { background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 14px; width: 100%; font-weight: 700; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <i class='bx bx-cog' style="font-size: 26px;"></i>
            <div class="search-bar">
                <i class='bx bx-search'></i>
                <input type="text" placeholder="Поиск">
            </div>
            <i class='bx bx-scan' style="font-size: 26px;"></i>
        </header>

        <div class="wallet-card">
            <div class="wallet-selector" onclick="openMenu()">
                Основной кошелек <i class='bx bx-chevron-right'></i>
            </div>
            <div class="main-balance" id="display-balance">0,00 $</div>
            <div class="sub-balance">0,00 $ (0.00%)</div>
        </div>

        <div class="actions">
            <div class="action-item">
                <div class="action-btn"><i class='bx bx-up-arrow-alt' style="transform: rotate(45deg);"></i></div>
                <span class="action-label">Отпр...</span>
            </div>
            <div class="action-item">
                <div class="action-btn"><i class='bx bx-down-arrow-alt'></i></div>
                <span class="action-label">Полу...</span>
            </div>
            <div class="action-item">
                <div class="action-btn"><i class='bx bx-refresh'></i></div>
                <span class="action-label">Обмен</span>
            </div>
            <div class="action-item">
                <div class="action-btn green-btn"><i class='bx bx-plus'></i></div>
                <span class="action-label">Поку...</span>
            </div>
        </div>

        <div class="tabs">
            <div class="tab">Криптовалюта</div>
            <div class="tab active">Избранное</div>
            <div class="tab">NFT</div>
            <div class="tab-icons">
                <i class='bx bx-history'></i>
                <i class='bx bx-slider-alt'></i>
            </div>
        </div>

        <div class="crypto-list" id="crypto-container">
            </div>

        <a href="#" class="view-all">Просмотреть токены</a>

        <div class="earn-header">Заработок <i class='bx bx-chevron-right'></i></div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active-pill">
            <i class='bx bxs-home-alt-2'></i>
            <span class="nav-label">Главная</span>
        </a>
        <a href="#" class="nav-item">
            <i class='bx bx-trending-up'></i>
            <span class="nav-label">Популярные</span>
        </a>
        <a href="#" class="nav-item trade-btn-container">
            <div class="trade-circle"><i class='bx bx-transfer'></i></div>
            <span class="trade-label">Торговать</span>
        </a>
        <a href="#" class="nav-item">
            <i class='bx bx-gift'></i>
            <span class="nav-label">Награды</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="openMenu()">
            <i class='bx bx-compass'></i>
            <span class="nav-label">Подробнее</span>
        </a>
    </nav>

    <div id="modal-overlay" onclick="closeMenu()">
        <div class="modal" onclick="event.stopPropagation()">
            <h3>Изменить баланс</h3>
            <p style="color: var(--text-muted); font-size: 14px;">Введите сумму в долларах</p>
            <input type="number" id="balance-input" placeholder="0">
            <button onclick="updateBalance()">Подтвердить</button>
        </div>
    </div>

    <script>
        // Управление модальным окном
        function openMenu() { document.getElementById('modal-overlay').style.display = 'flex'; }
        function closeMenu() { document.getElementById('modal-overlay').style.display = 'none'; }

        function updateBalance() {
            const val = document.getElementById('balance-input').value;
            if(val !== "") {
                const formatted = new Intl.NumberFormat('ru-RU').format(val);
                document.getElementById('display-balance').innerText = formatted + ",00 $";
                closeMenu();
            }
        }

        // Данные криптовалют
        const coins = [
            { id: 'solana', symbol: 'SOL', icon: 'https://assets.coingecko.com/coins/images/4128/small/solana.png' },
            { id: 'ethereum', symbol: 'ETH', icon: 'https://assets.coingecko.com/coins/images/279/small/ethereum.png' },
            { id: 'bitcoin', symbol: 'BTC', icon: 'https://assets.coingecko.com/coins/images/1/small/bitcoin.png' },
            { id: 'binancecoin', symbol: 'BNB', icon: 'https://assets.coingecko.com/coins/images/825/small/bnb-icon2_2x.png' }
        ];

        async function fetchPrices() {
            try {
                const ids = coins.map(c => c.id).join(',');
                const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true&include_market_cap=true`);
                const data = await response.json();
                renderList(data);
            } catch (e) { 
                console.log("Ошибка API. Используются заглушки.");
            }
        }

        function renderList(data) {
            const container = document.getElementById('crypto-container');
            container.innerHTML = '';
            coins.forEach(coin => {
                const price = data[coin.id].usd;
                const change = data[coin.id].usd_24h_change.toFixed(2);
                const mCap = (data[coin.id].usd_market_cap / 1e9).toFixed(2);
                const isUp = change >= 0;
                
                container.innerHTML += `
                    <div class="crypto-item">
                        <div class="c-left">
                            <img src="${coin.icon}" class="c-icon">
                            <div>
                                <span class="c-name">${coin.symbol}</span>
                                <span class="c-mcap">${mCap} $B</span>
                            </div>
                        </div>
                        <div class="c-right">
                            <span class="c-price">${new Intl.NumberFormat('en-US').format(price)} $</span>
                            <span class="c-change ${isUp ? 'up' : 'down'}">${isUp ? '+' : ''}${change}%</span>
                        </div>
                    </div>
                `;
            });
        }

        fetchPrices();
        setInterval(fetchPrices, 30000); // Обновление каждые 30 сек
    </script>
</body>
</html>
