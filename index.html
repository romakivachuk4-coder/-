<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trust Wallet Pro UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0c0c0c;
            --surface: #1a1a1a;
            --accent: #32f37a; /* Фирменный зеленый Trust */
            --text-main: #ffffff;
            --text-muted: #8c8c8c;
            --red: #ff5050;
            --green: #32f37a;
            --nav-bg: rgba(22, 22, 22, 0.92);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            display: flex; justify-content: center; 
            overflow-x: hidden; 
        }
        
        .app-container { width: 100%; max-width: 480px; padding-bottom: 140px; }

        /* Header */
        .header { 
            display: flex; align-items: center; padding: 10px 16px; gap: 14px; 
            position: sticky; top: 0; background: var(--bg-color); z-index: 10; 
        }
        .settings-btn { position: relative; font-size: 24px; cursor: pointer; }
        .dot { 
            position: absolute; top: -2px; right: -2px; 
            width: 8px; height: 8px; background: var(--red); 
            border-radius: 50%; border: 2px solid var(--bg-color);
        }

        .search-bar { 
            flex-grow: 1; background: var(--surface); border-radius: 16px; 
            display: flex; align-items: center; padding: 10px 16px; gap: 10px; 
        }
        .search-bar input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 16px; font-weight: 500; }
        .search-bar i { color: var(--text-muted); font-size: 18px; }

        /* Wallet Section */
        .wallet-card { text-align: center; padding: 24px 0; }
        .wallet-selector { 
            display: inline-flex; align-items: center; gap: 4px; 
            background: #222; padding: 6px 14px; border-radius: 20px; 
            font-size: 14px; font-weight: 600; margin-bottom: 12px; cursor: pointer; 
        }
        .main-balance { font-size: 46px; font-weight: 700; letter-spacing: -1px; }
        .sub-balance { font-size: 15px; margin-top: 6px; font-weight: 600; }

        /* Actions - Pixel Perfect Sizes */
        .actions { display: flex; justify-content: center; gap: 18px; padding: 10px 16px 30px; }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1; max-width: 80px; }
        .action-btn { 
            width: 60px; height: 60px; border-radius: 20px; 
            background: var(--surface); display: flex; align-items: center; 
            justify-content: center; font-size: 28px; transition: transform 0.1s;
        }
        .action-btn:active { transform: scale(0.95); }
        .action-btn.green-btn { background: var(--accent); color: #000; }
        .action-label { font-size: 13px; font-weight: 600; color: #fff; }

        /* Tabs */
        .tabs { display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid #1f1f1f; margin-bottom: 10px; }
        .tab { padding: 14px 10px; color: var(--text-muted); font-weight: 700; font-size: 15px; cursor: pointer; }
        .tab.active { color: #fff; position: relative; }
        .tab.active::after { 
            content: ''; position: absolute; bottom: 0; left: 8px; right: 8px; 
            height: 3px; background: var(--accent); border-radius: 4px; 
        }
        .tab-icons { margin-left: auto; display: flex; gap: 20px; color: var(--text-muted); font-size: 22px; }

        /* Crypto List */
        .crypto-list { padding: 0 16px; }
        .crypto-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; cursor: pointer; }
        .c-left { display: flex; align-items: center; gap: 12px; }
        .c-icon { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .c-name { font-weight: 700; font-size: 16px; color: #fff; }
        .c-mcap { font-size: 13px; color: var(--text-muted); font-weight: 500; }
        .c-right { text-align: right; }
        .c-price { font-weight: 700; font-size: 16px; color: #fff; margin-bottom: 2px; }
        .c-change { font-size: 13px; font-weight: 600; }
        
        .up { color: var(--green) !important; }
        .down { color: var(--red) !important; }

        .view-all { text-align: center; color: var(--accent); font-weight: 700; padding: 20px; display: block; text-decoration: none; font-size: 15px; }
        .earn-header { display: flex; justify-content: space-between; padding: 16px; font-weight: 700; font-size: 19px; align-items: center; }

        /* Floating Navigation Bar - Updated to Match Screenshot */
        .nav-wrapper {
            position: fixed; bottom: 25px; left: 0; width: 100%;
            display: flex; justify-content: center; padding: 0 16px; z-index: 100;
        }
        .bottom-nav { 
            width: 100%; max-width: 420px; background: var(--nav-bg); 
            border-radius: 40px; height: 80px; display: flex; 
            justify-content: space-around; align-items: center; 
            padding: 0 8px; border: 1px solid #2a2a2a; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); text-decoration: none; gap: 5px; flex: 1; }
        .nav-item.active-pill { 
            background: rgba(50, 243, 122, 0.15); border-radius: 32px; height: 64px; 
            justify-content: center; color: var(--accent); 
        }
        .nav-item i { font-size: 26px; }
        .nav-label { font-size: 11px; font-weight: 600; }
        
        .trade-circle { 
            background: var(--accent); width: 56px; height: 56px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: #000; font-size: 30px; position: absolute; top: -28px; 
            box-shadow: 0 6px 16px rgba(50, 243, 122, 0.3); 
        }
        .trade-item { position: relative; overflow: visible; height: 100%; }
        .trade-label-fix { margin-top: 38px; }

        /* Modal Settings */
        #modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 200; display: none; 
            justify-content: center; align-items: center; 
        }
        .modal { 
            background: var(--surface); padding: 30px; border-radius: 28px; 
            width: 88%; max-width: 340px; text-align: center; border: 1px solid #333; 
        }
        .modal input { 
            width: 100%; padding: 16px; border-radius: 16px; border: 1px solid #444; 
            background: #000; color: #fff; margin: 20px 0; outline: none; 
            font-size: 26px; font-weight: 700; text-align: center; 
        }
        .modal button { 
            background: var(--accent); color: #000; border: none; padding: 16px; 
            border-radius: 16px; width: 100%; font-weight: 800; font-size: 16px; cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <div class="settings-btn">
                <i class='bx bx-cog'></i>
                <div class="dot"></div>
            </div>
            <div class="search-bar">
                <i class='bx bx-search'></i>
                <input type="text" placeholder="Поиск">
            </div>
            <i class='bx bx-scan' style="font-size: 24px;"></i>
        </header>

        <div class="wallet-card">
            <div class="wallet-selector" onclick="openMenu()">Основной кошелек <i class='bx bx-chevron-right'></i></div>
            <div class="main-balance" id="display-balance">0,00 $</div>
            <div class="sub-balance" id="display-sub">0,00 $ (0.00%)</div>
        </div>

        <div class="actions">
            <div class="action-item">
                <div class="action-btn"><i class='bx bx-up-arrow-alt' style="transform: rotate(45deg);"></i></div>
                <span class="action-label">Отпр...</span>
            </div>
            <div class="action-item">
                <div class="action-btn"><i class='bx bx-down-arrow-alt'></i></div>
                <span class="action-label">Полу...</span>
            </div>
            <div class="action-item">
                <div class="action-btn"><i class='bx bx-refresh'></i></div>
                <span class="action-label">Обмен</span>
            </div>
            <div class="action-item">
                <div class="action-btn green-btn"><i class='bx bx-plus'></i></div>
                <span class="action-label">Поку...</span>
            </div>
        </div>

        <div class="tabs">
            <div class="tab">Криптовалюта</div>
            <div class="tab active">Избранное</div>
            <div class="tab">NFT</div>
            <div class="tab-icons">
                <i class='bx bx-time-five'></i>
                <i class='bx bx-slider-alt' style="transform: rotate(90deg);"></i>
            </div>
        </div>

        <div class="crypto-list" id="crypto-container"></div>
        <a href="#" class="view-all">Просмотреть токены</a>
        <div class="earn-header">Заработок <i class='bx bx-chevron-right' style="color: var(--text-muted);"></i></div>
    </div>

    <div class="nav-wrapper">
        <nav class="bottom-nav">
            <a href="#" class="nav-item active-pill">
                <i class='bx bxs-home-alt-2'></i>
                <span class="nav-label">Главная</span>
            </a>
            <a href="#" class="nav-item">
                <i class='bx bx-trending-up'></i>
                <span class="nav-label">Популярные</span>
            </a>
            <div class="nav-item trade-item">
                <div class="trade-circle"><i class='bx bx-transfer'></i></div>
                <span class="nav-label trade-label-fix">Торговать</span>
            </div>
            <a href="#" class="nav-item">
                <i class='bx bx-gift'></i>
                <span class="nav-label">Награды</span>
            </a>
            <a href="javascript:void(0)" class="nav-item" onclick="openMenu()">
                <i class='bx bx-compass'></i>
                <span class="nav-label">Подробнее</span>
            </a>
        </nav>
    </div>

    <div id="modal-overlay" onclick="closeMenu()">
        <div class="modal" onclick="event.stopPropagation()">
            <h3>Депозит USDT</h3>
            <p style="color: var(--text-muted); font-size: 14px; margin-top: 5px;">Введите сумму монет для имитации</p>
            <input type="number" id="balance-input" placeholder="0.00" step="any">
            <button onclick="updateBalance()">Подтвердить</button>
        </div>
    </div>

    <script>
        let usdtHoldings = parseFloat(localStorage.getItem('usdt_count')) || 0;

        function openMenu() { document.getElementById('modal-overlay').style.display = 'flex'; }
        function closeMenu() { document.getElementById('modal-overlay').style.display = 'none'; }

        function updateBalance() {
            const val = document.getElementById('balance-input').value;
            if(val !== "") {
                usdtHoldings = parseFloat(val);
                localStorage.setItem('usdt_count', usdtHoldings);
                fetchPrices();
                closeMenu();
            }
        }

        const coinsConfig = [
            { id: 'solana', symbol: 'SOL', icon: 'https://assets.coingecko.com/coins/images/4128/small/solana.png' },
            { id: 'ethereum', symbol: 'ETH', icon: 'https://assets.coingecko.com/coins/images/279/small/ethereum.png' },
            { id: 'bitcoin', symbol: 'BTC', icon: 'https://assets.coingecko.com/coins/images/1/small/bitcoin.png' },
            { id: 'binancecoin', symbol: 'BNB', icon: 'https://assets.coingecko.com/coins/images/825/small/bnb-icon2_2x.png' }
        ];

        async function fetchPrices() {
            try {
                const ids = "tether," + coinsConfig.map(c => c.id).join(',');
                const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true&include_market_cap=true`);
                const data = await response.json();
                
                // Главный баланс привязан к USDT
                const usdtPrice = data['tether'].usd;
                const usdtChangePercent = data['tether'].usd_24h_change;
                const totalUsd = usdtHoldings * usdtPrice;
                const changeInUsd = totalUsd * (usdtChangePercent / 100);

                document.getElementById('display-balance').innerText = 
                    new Intl.NumberFormat('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(totalUsd) + " $";

                const subEl = document.getElementById('display-sub');
                const sign = changeInUsd >= 0 ? '+' : '';
                subEl.innerText = `${sign}${changeInUsd.toFixed(2)} $ (${sign}${usdtChangePercent.toFixed(2)}%)`;
                subEl.className = `sub-balance ${usdtChangePercent >= 0 ? 'up' : 'down'}`;

                renderList(data);
            } catch (e) { console.error("API Error"); }
        }

        function renderList(data) {
            const container = document.getElementById('crypto-container');
            container.innerHTML = '';
            
            coinsConfig.forEach(coin => {
                const coinData = data[coin.id];
                const price = coinData.usd;
                const change = coinData.usd_24h_change.toFixed(2);
                const mCap = (coinData.usd_market_cap / 1e9).toFixed(2);
                const isUp = coinData.usd_24h_change >= 0;
                
                container.innerHTML += `
                    <div class="crypto-item">
                        <div class="c-left">
                            <img src="${coin.icon}" class="c-icon">
                            <div>
                                <span class="c-name">${coin.symbol}</span>
                                <span class="c-mcap">${mCap} $B</span>
                            </div>
                        </div>
                        <div class="c-right">
                            <span class="c-price">${new Intl.NumberFormat('en-US', { minimumFractionDigits: 2 }).format(price)} $</span>
                            <span class="c-change ${isUp ? 'up' : 'down'}">${isUp ? '+' : ''}${change}%</span>
                        </div>
                    </div>
                `;
            });
        }

        fetchPrices();
        setInterval(fetchPrices, 15000);
    </script>
</body>
</html>
