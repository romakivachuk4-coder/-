<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trust Wallet Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --accent: #38f37b;
            --muted: #8e8e8e;
            --red: #ff4a4a;
            --green: #38f37b;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { background: var(--bg); color: #fff; display: flex; justify-content: center; }

        .app { width: 100%; max-width: 480px; padding-bottom: 130px; min-height: 100vh; }

        /* Анимация обновления баланса */
        .updating { animation: fadeUpdate 0.5s ease-in-out; }
        @keyframes fadeUpdate {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Header */
        .header { display: flex; align-items: center; padding: 12px 16px; gap: 15px; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .icon-p { position: relative; display: flex; align-items: center; }
        .dot { 
            position: absolute; top: -2px; right: -2px; width: 11px; height: 11px; 
            background: var(--red); border-radius: 50%; border: 2px solid var(--bg); 
            box-shadow: 0 0 8px rgba(255, 74, 74, 0.7); animation: pulse 2.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

        .search { flex: 1; background: var(--surface); border-radius: 12px; display: flex; align-items: center; padding: 10px 14px; gap: 10px; }
        .search input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 16px; }

        /* Wallet */
        .wallet-sec { text-align: center; padding: 20px 0 30px; }
        .w-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; }
        .w-pill { background: var(--surface); padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 4px; position: relative; cursor: pointer; }
        .bal-m { font-size: 52px; font-weight: 700; letter-spacing: -1.5px; }
        .bal-s { font-size: 16px; font-weight: 500; margin-top: 5px; }

        /* Actions */
        .acts { display: flex; justify-content: center; gap: 20px; margin-bottom: 35px; }
        .act-i { display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; }
        .act-b { width: 62px; height: 62px; border-radius: 20px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 28px; transition: 0.2s; }
        .act-i:active .act-b { transform: scale(0.9); }
        .act-b.buy { background: var(--accent); color: #000; }
        .act-l { font-size: 13px; font-weight: 500; }

        /* Tabs */
        .tabs { display: flex; align-items: center; padding: 0 4px; border-bottom: 1px solid #1a1a1a; margin-bottom: 10px; }
        .tab { padding: 14px 12px; color: var(--muted); font-weight: 700; font-size: 15px; }
        .tab.active { color: #fff; position: relative; }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 12px; right: 12px; height: 3px; background: var(--accent); border-radius: 2px; }
        .t-tools { margin-left: auto; display: flex; gap: 18px; color: var(--muted); padding-right: 16px; }

        /* Coin List */
        .coin { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; }
        .c-l { display: flex; align-items: center; gap: 14px; }
        .c-img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; }
        .c-sym { font-weight: 700; font-size: 17px; }
        .c-cap { font-size: 13px; color: var(--muted); }
        .c-r { text-align: right; }
        .c-pr { font-weight: 600; font-size: 17px; }
        .c-pct { font-size: 13px; font-weight: 500; }

        /* Bottom Nav */
        .nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; background: #161616; border-radius: 40px; height: 76px; display: flex; align-items: center; border: 1px solid #252525; z-index: 1000; }
        .nav-a { flex: 1; display: flex; flex-direction: column; align-items: center; color: var(--muted); text-decoration: none; font-size: 10px; gap: 4px; cursor: pointer; }
        .nav-a.active { color: var(--accent); }
        .nav-a i { font-size: 24px; }
        .tr-c { width: 54px; height: 54px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 26px; margin-top: -42px; border: 4px solid var(--bg); }

        /* Modal */
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal { background: var(--surface); padding: 30px; border-radius: 28px; width: 85%; max-width: 340px; text-align: center; border: 1px solid #333; }
        .modal input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 18px; border-radius: 14px; margin: 20px 0; font-size: 28px; text-align: center; outline: none; }
        .modal button { background: var(--accent); border: none; width: 100%; padding: 16px; border-radius: 14px; font-weight: 700; font-size: 16px; color: #000; cursor: pointer; }

        .up { color: var(--green); }
        .down { color: var(--red); }
    </style>
</head>
<body>

<div class="app">
    <header class="header">
        <div class="icon-p"><i class='bx bx-cog' style="font-size: 26px;"></i><div class="dot"></div></div>
        <div class="search"><i class='bx bx-search'></i><input type="text" placeholder="Поиск"></div>
        <i class='bx bx-scan' style="font-size: 26px; color: var(--muted);"></i>
    </header>

    <div class="wallet-sec" id="wallet-container">
        <div class="w-row">
            <div class="w-pill" onclick="openM()">
                Основной кошелек <i class='bx bx-chevron-right'></i>
                <div class="dot" style="top:-5px; right:-5px;"></div>
            </div>
        </div>
        <div class="bal-m" id="main-bal">0,00 $</div>
        <div class="bal-s" id="sub-bal">0,00 $ (0.00%)</div>
    </div>

    <div class="acts">
        <div class="act-i"><div class="act-b"><i class='bx bx-up-arrow-alt' style="transform: rotate(45deg);"></i></div><span class="act-l">Отпр...</span></div>
        <div class="act-i"><div class="act-b"><i class='bx bx-down-arrow-alt'></i></div><span class="act-l">Полу...</span></div>
        <div class="act-i"><div class="act-b"><i class='bx bx-refresh'></i></div><span class="act-l">Обмен</span></div>
        <div class="act-i"><div class="act-b buy"><i class='bx bx-plus'></i></div><span class="act-l">Поку...</span></div>
    </div>

    <div class="tabs">
        <div class="tab">Криптовалюта</div><div class="tab active">Избранное</div><div class="tab">NFT</div>
        <div class="t-tools"><i class='bx bx-history'></i><i class='bx bx-slider-alt'></i></div>
    </div>

    <div id="coin-list"></div>

    <div style="text-align: center; color: var(--accent); padding: 25px; font-weight: 600; font-size: 15px;">Просмотреть токены</div>
    <div style="padding: 10px 16px; font-size: 19px; font-weight: 700; display: flex; justify-content: space-between; align-items: center;">
        Заработок <i class='bx bx-chevron-right' style="color: var(--muted);"></i>
    </div>
</div>

<nav class="nav">
    <a class="nav-a active"><i class='bx bxs-home-alt-2'></i><span>Главная</span></a>
    <a class="nav-a"><i class='bx bx-trending-up'></i><span>Популярные</span></a>
    <div class="nav-a"><div class="tr-c"><i class='bx bx-transfer'></i></div><span style="margin-top:5px">Торговать</span></div>
    <a class="nav-a"><i class='bx bx-gift'></i><span>Награды</span></a>
    <a class="nav-a" onclick="openM()"><i class='bx bx-compass'></i><span>Подробнее</span></a>
</nav>

<div id="modal-overlay" onclick="closeM()">
    <div class="modal" onclick="event.stopPropagation()">
        <h3>Количество USDT</h3>
        <p style="color: var(--muted); font-size: 13px; margin-top: 5px;">Введите баланс в монетах USDT</p>
        <input type="number" id="bal-input" placeholder="0" step="any">
        <button onclick="updateBalance()">Подтвердить</button>
    </div>
</div>

<script>
    let usdtHoldings = parseFloat(localStorage.getItem('usdt_count')) || 0;

    function openM() { document.getElementById('modal-overlay').style.display = 'flex'; }
    function closeM() { document.getElementById('modal-overlay').style.display = 'none'; }

    function updateBalance() {
        const val = document.getElementById('bal-input').value;
        if(val !== "") {
            usdtHoldings = parseFloat(val);
            localStorage.setItem('usdt_count', usdtHoldings);
            
            // Добавляем класс анимации обновления
            const container = document.getElementById('wallet-container');
            container.classList.remove('updating');
            void container.offsetWidth; // Магия для перезапуска анимации
            container.classList.add('updating');
            
            fetchPrices();
            closeM();
        }
    }

    async function fetchPrices() {
        const fmt = new Intl.NumberFormat('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=tether,bitcoin,ethereum,solana,binancecoin&vs_currencies=usd&include_24hr_change=true&include_market_cap=true');
            const data = await res.json();
            
            const price = data.tether.usd;
            const changePct = data.tether.usd_24h_change;
            const total = usdtHoldings * price;
            const diff = total - (total / (1 + changePct / 100));

            document.getElementById('main-bal').innerText = fmt.format(total) + " $";
            const subEl = document.getElementById('sub-bal');
            subEl.innerText = `${changePct >= 0 ? '+' : ''}${diff.toFixed(2)} $ (${changePct >= 0 ? '+' : ''}${changePct.toFixed(2)}%)`;
            subEl.className = `bal-s ${changePct >= 0 ? 'up' : 'down'}`;

            const config = [
                {id:'solana', s:'SOL', img:'https://assets.coingecko.com/coins/images/4128/small/solana.png'},
                {id:'ethereum', s:'ETH', img:'https://assets.coingecko.com/coins/images/279/small/ethereum.png'},
                {id:'bitcoin', s:'BTC', img:'https://assets.coingecko.com/coins/images/1/small/bitcoin.png'},
                {id:'binancecoin', s:'BNB', img:'https://assets.coingecko.com/coins/images/825/small/bnb-icon2_2x.png'}
            ];

            let html = '';
            config.forEach(c => {
                const coin = data[c.id];
                const isUp = coin.usd_24h_change >= 0;
                html += `
                <div class="coin">
                    <div class="c-l">
                        <img src="${c.img}" class="c-img">
                        <div>
                            <div class="c-sym">${c.s}</div>
                            <div class="c-cap">${(coin.usd_market_cap/1e9).toFixed(2)} $B</div>
                        </div>
                    </div>
                    <div class="c-r">
                        <div class="c-pr">${fmt.format(coin.usd)} $</div>
                        <div class="c-pct ${isUp?'up':'down'}">${isUp?'+':''}${coin.usd_24h_change.toFixed(2)}%</div>
                    </div>
                </div>`;
            });
            document.getElementById('coin-list').innerHTML = html;
        } catch(e) {}
    }

    fetchPrices();
    setInterval(fetchPrices, 20000);
</script>
</body>
</html>
